<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poiret One', cursive;
            background: #D56989;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .frame {
            max-width: 1300px;
            width: 100%;
            background: #F3EEF1;
            padding: 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding: 25px 30px;
            background-image: url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');
            background-size: cover;
            position: relative;
        }
        .header::before, .bottom-block::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(153,86,113,0.5); }
        .logo, .nav, .bottom-block > * { position: relative; z-index: 1; }
        .logo { font-size: 36px; font-weight: 600; color: #C2DC80; text-decoration: none; text-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        .nav { display: flex; flex-wrap: wrap; gap: 20px; }
        .nav a { color: #C2DC80; text-decoration: none; font-size: 20px; transition: 0.2s; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
        .line { width: 100%; height: 3px; background: #C2DC80; margin: 30px 0; opacity: 0.5; }
        .page-title { font-size: 38px; font-weight: 700; color: #D56989; margin-bottom: 30px; text-align: center; }
        .profile-card { background: #C2DC80; border: 1px solid #D56989; padding: 30px; text-align: center; margin-bottom: 30px; }
        .avatar { font-size: 70px; margin-bottom: 10px; }
        .profile-name { font-size: 28px; font-weight: 600; color: #D56989; }
        .profile-email, .profile-phone { font-size: 18px; color: #5b3b45; margin: 8px 0; }
        .profile-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        button { background: #D56989; border: none; padding: 10px 25px; font-family: inherit; font-size: 16px; cursor: pointer; color: #F3EEF1; transition: 0.2s; }
        button:hover { background: #b84d6e; }
        .logout-btn { background: #b84d6e; }
        .admin-btn { background: #1f5437; }
        .auth-card { background: #C2DC80; border: 1px solid #D56989; padding: 30px; max-width: 450px; margin: 0 auto 30px; }
        .auth-card h3 { font-size: 28px; color: #D56989; text-align: center; margin-bottom: 20px; }
        .input-group { position: relative; margin: 10px 0; }
        .auth-input { width: 100%; padding: 12px; padding-right: 45px; border: 1px solid #D56989; background: #F3EEF1; font-family: inherit; font-size: 16px; color: #D56989; }
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; padding: 0; color: #D56989; }
        .toggle-password:hover { background: none; transform: translateY(-50%) scale(1.1); }
        .auth-btn { width: 100%; font-size: 18px; margin-top: 15px; }
        .switch-auth { margin-top: 15px; text-align: center; font-size: 14px; cursor: pointer; text-decoration: underline; color: #D56989; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #C2DC80; }
        .tab { flex: 1; text-align: center; padding: 12px; background: none; border: none; font-family: inherit; font-size: 18px; cursor: pointer; color: #D56989; }
        .tab.active { background: #C2DC80; color: #D56989; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .order-item { background: #F3EEF1; border: 1px solid #C2DC80; padding: 15px; margin-bottom: 12px; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; color: #D56989; }
        .order-status { background: #D56989; color: #F3EEF1; padding: 3px 12px; font-size: 12px; }
        .order-details { font-size: 14px; color: #5b3b45; }
        .empty { text-align: center; padding: 50px; color: #D56989; font-size: 18px; }
        .address-item { background: #F3EEF1; border: 1px solid #C2DC80; padding: 12px 15px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .add-addr, .remove-btn { background: #D56989; color: #F3EEF1; border: none; padding: 8px 20px; cursor: pointer; }
        .remove-btn { padding: 5px 12px; font-size: 12px; }
        .bottom-block { background-image: url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg'); background-size: cover; margin-top: 40px; padding: 30px 20px 20px; position: relative; }
        .footer-info { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; color: #C2DC80; margin: 15px 0 30px; font-size: 18px; }
        .social-links { display: flex; justify-content: center; gap: 35px; flex-wrap: wrap; margin-bottom: 20px; }
        .social-link { color: #C2DC80; text-decoration: none; font-size: 20px; padding: 6px 18px; transition: 0.2s; }
        .social-link:hover { background: rgba(193,130,146,0.35); transform: translateY(-2px); }
        .copyright { text-align: center; font-size: 15px; color: #C2DC80; }
        @media (max-width: 700px) {
            .frame { padding: 20px; }
            .header { flex-direction: column; text-align: center; }
            .logo { font-size: 28px; }
            .nav a { font-size: 16px; }
            .profile-buttons { flex-direction: column; align-items: center; }
            .footer-info { flex-direction: column; gap: 15px; text-align: center; }
            .social-link { font-size: 16px; padding: 4px 12px; }
        }
    </style>
</head>
<body>
<div class="frame">
    <div class="header"><a href="index.html" class="logo">Estética</a><div class="nav"><a href="index.html">ГЛАВНАЯ</a><a href="index2.html">КАТАЛОГ</a><a href="index5.html">КОНТАКТЫ</a><a href="index3.html">КОРЗИНА</a><a href="index4.html">КАБИНЕТ</a></div></div>
    <div class="line"></div>
    <h1 class="page-title">Личный кабинет</h1>
    <div id="authBlock"></div>
    <div id="userPanel" style="display:none;">
        <div class="tabs"><button class="tab active" onclick="showTab('orders')">📦 Заказы</button><button class="tab" onclick="showTab('addresses')">🏠 Адреса</button></div>
        <div id="tab-orders" class="tab-content active"><div id="ordersList"></div></div>
        <div id="tab-addresses" class="tab-content"><div id="addressesList"></div><button class="add-addr" onclick="addAddress()">+ Добавить адрес</button></div>
    </div>
    <div class="bottom-block"><div class="footer-info"><span>✦ Цветы, которых нет у других</span><span>✦ Эксклюзив в каждом стебле</span><span>✦ Скажут больше, чем слова</span></div><div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">📘 ВКонтакте</a><a href="https://instagram.com" target="_blank" class="social-link">📷 Instagram</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">💬 WhatsApp</a></div><div class="copyright">© 2026 Estética — Цветочная мастерская</div></div>
</div>

<script>
// ==================== РАБОТА С ПОЛЬЗОВАТЕЛЯМИ ====================
function getUsers() { 
    let data = localStorage.getItem('estetica_users');
    return data ? JSON.parse(data) : [];
}

function saveUsers(users) { 
    localStorage.setItem('estetica_users', JSON.stringify(users));
    console.log('✅ Пользователи сохранены:', users);
}

function getCurrentUser() { 
    let data = localStorage.getItem('estetica_current_user');
    return data ? JSON.parse(data) : null;
}

function setCurrentUser(user) { 
    if (user) {
        localStorage.setItem('estetica_current_user', JSON.stringify(user));
    } else {
        localStorage.removeItem('estetica_current_user');
    }
}

// Автоматическое создание админа
function initAdmin() {
    let users = getUsers();
    let adminExists = users.some(u => u.isAdmin === true);
    
    if (!adminExists) {
        const admin = {
            id: Date.now(),
            email: 'ancord51217@gmail.com',
            password: 'ananasik051217',
            name: 'Главный администратор',
            phone: '+7 (999) 000-00-00',
            addresses: ['Москва, ул. Нансена, 1'],
            orders: [],
            isAdmin: true
        };
        users.push(admin);
        saveUsers(users);
        console.log('✅ Администратор автоматически создан');
    }
}

// Регистрация
function register(email, password, name) {
    let users = getUsers();
    
    // Проверка на существующего пользователя
    if (users.find(u => u.email === email)) {
        alert('❌ Пользователь с таким email уже существует!');
        return false;
    }
    
    // Проверка на админа (только для указанного email и пароля)
    let isAdmin = (email === 'ancord51217@gmail.com' && password === 'ananasik051217');
    
    const newUser = {
        id: Date.now(),
        email: email,
        password: password,
        name: name || email.split('@')[0],
        phone: 'не указан',
        addresses: ['Москва, ул. Нансена, 1'],
        orders: [],
        isAdmin: isAdmin
    };
    
    users.push(newUser);
    saveUsers(users);
    setCurrentUser(newUser);
    
    console.log('✅ Новый пользователь зарегистрирован:', newUser);
    alert(isAdmin ? '👑 Вы зарегистрировались как администратор!' : '✅ Регистрация успешна! Добро пожаловать!');
    return true;
}

// Вход
function login(email, password) {
    const users = getUsers();
    const user = users.find(u => u.email === email && u.password === password);
    
    if (user) {
        setCurrentUser(user);
        console.log('✅ Вход выполнен:', user.email);
        alert(user.isAdmin ? `👑 Добро пожаловать, администратор ${user.name}!` : `🌸 Добро пожаловать, ${user.name}!`);
        return true;
    }
    
    alert('❌ Неверный email или пароль!');
    return false;
}

function logout() { 
    setCurrentUser(null); 
    renderAuthScreen(); 
    alert('👋 Вы вышли из аккаунта');
}

function updateUserData(updates) { 
    let cu = getCurrentUser(); 
    if (!cu) return; 
    let users = getUsers(); 
    let idx = users.findIndex(u => u.id === cu.id); 
    if (idx !== -1) { 
        users[idx] = { ...users[idx], ...updates }; 
        saveUsers(users); 
        setCurrentUser(users[idx]); 
    } 
}

// ==================== ПОКАЗ/СКРЫТИЕ ПАРОЛЯ ====================
function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
        input.type = 'text';
    } else {
        input.type = 'password';
    }
}

// ==================== ОТОБРАЖЕНИЕ ====================
function renderAuthScreen() {
    let cu = getCurrentUser();
    let auth = document.getElementById('authBlock');
    let panel = document.getElementById('userPanel');
    
    if (!cu) {
        auth.innerHTML = `<div class="auth-card"><div id="authForm"><h3>🌸 Вход</h3><div class="input-group"><input type="email" id="loginEmail" class="auth-input" placeholder="Email"></div><div class="input-group"><input type="password" id="loginPassword" class="auth-input" placeholder="Пароль"><button class="toggle-password" onclick="togglePassword('loginPassword')">👁️</button></div><button class="auth-btn" onclick="doLogin()">Войти</button><div class="switch-auth" onclick="showRegisterForm()">Нет аккаунта? Зарегистрироваться</div></div></div>`;
        panel.style.display = 'none';
    } else {
        let adminButton = cu.isAdmin ? `<button class="admin-btn" onclick="location.href='admin.html'">👑 Админ-панель</button>` : '';
        auth.innerHTML = `<div class="profile-card"><div class="avatar">🌸</div><div class="profile-name">${cu.name}</div><div class="profile-email">${cu.email}</div><div class="profile-phone">📞 ${cu.phone || 'не указан'}</div><div class="profile-buttons"><button onclick="editProfile()">✎ Редактировать</button><button class="logout-btn" onclick="logout()">🚪 Выйти</button>${adminButton}</div></div>`;
        panel.style.display = 'block';
        loadOrders();
        loadAddresses();
    }
}

window.showRegisterForm = function() {
    document.getElementById('authForm').innerHTML = `<h3>🌸 Регистрация</h3><div class="input-group"><input type="text" id="regName" class="auth-input" placeholder="Ваше имя"></div><div class="input-group"><input type="email" id="regEmail" class="auth-input" placeholder="Email"></div><div class="input-group"><input type="password" id="regPassword" class="auth-input" placeholder="Пароль"><button class="toggle-password" onclick="togglePassword('regPassword')">👁️</button></div><button class="auth-btn" onclick="doRegister()">Зарегистрироваться</button><div class="switch-auth" onclick="showLoginForm()">Уже есть аккаунт? Войти</div>`;
};

window.showLoginForm = function() {
    document.getElementById('authForm').innerHTML = `<h3>🌸 Вход</h3><div class="input-group"><input type="email" id="loginEmail" class="auth-input" placeholder="Email"></div><div class="input-group"><input type="password" id="loginPassword" class="auth-input" placeholder="Пароль"><button class="toggle-password" onclick="togglePassword('loginPassword')">👁️</button></div><button class="auth-btn" onclick="doLogin()">Войти</button><div class="switch-auth" onclick="showRegisterForm()">Нет аккаунта? Зарегистрироваться</div>`;
};

window.doLogin = function() { 
    let e = document.getElementById('loginEmail')?.value; 
    let p = document.getElementById('loginPassword')?.value; 
    if (e && p && login(e, p)) renderAuthScreen(); 
    else if (!e || !p) alert('Заполните все поля!'); 
};

window.doRegister = function() { 
    let n = document.getElementById('regName')?.value; 
    let e = document.getElementById('regEmail')?.value; 
    let p = document.getElementById('regPassword')?.value; 
    if (n && e && p && register(e, p, n)) renderAuthScreen(); 
    else alert('Заполните все поля!'); 
};

window.editProfile = function() { 
    let cu = getCurrentUser(); 
    if (!cu) return; 
    let n = prompt('Новое имя:', cu.name); 
    let ph = prompt('Новый телефон:', cu.phone || ''); 
    let upd = {}; 
    if (n) upd.name = n; 
    if (ph) upd.phone = ph; 
    if (Object.keys(upd).length) { 
        updateUserData(upd); 
        renderAuthScreen(); 
        alert('✅ Профиль обновлён!'); 
    } 
};

function loadOrders() {
    let cu = getCurrentUser();
    let cont = document.getElementById('ordersList');
    
    if (!cu || !cu.orders || cu.orders.length === 0) {
        cont.innerHTML = '<div class="empty">📦 Заказов пока нет<br><a href="index2.html" style="color:#D56989;">Перейти в каталог</a></div>';
        return;
    }
    
    cont.innerHTML = cu.orders.map(o => `<div class="order-item"><div class="order-header"><span>📅 ${o.date}</span><span class="order-status">${o.status}</span></div><div class="order-details">${o.items.map(i => `${i.name} x ${i.quantity}`).join(', ')}</div><div class="order-details">💰 ${o.total} ₽ | 🚚 ${o.address}</div></div>`).join('');
}

function loadAddresses() {
    let cu = getCurrentUser();
    let cont = document.getElementById('addressesList');
    let addrs = cu?.addresses || ['Москва, ул. Нансена, 1'];
    
    cont.innerHTML = addrs.map((a, i) => `<div class="address-item"><span>🏠 ${a}</span><button class="remove-btn" onclick="deleteAddress(${i})">🗑 Удалить</button></div>`).join('');
}

window.addAddress = function() { 
    let cu = getCurrentUser(); 
    if (!cu) return; 
    let a = prompt('Введите новый адрес:'); 
    if (a?.trim()) updateUserData({ addresses: [...(cu.addresses || []), a.trim()] }); 
    loadAddresses(); 
};

window.deleteAddress = function(i) { 
    let cu = getCurrentUser(); 
    if (!cu) return; 
    let a = [...(cu.addresses || [])]; 
    a.splice(i, 1); 
    updateUserData({ addresses: a }); 
    loadAddresses(); 
};

window.showTab = function(t) { 
    document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active')); 
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); 
    event.target.classList.add('active'); 
    document.getElementById(`tab-${t}`).classList.add('active'); 
    if (t === 'orders') loadOrders(); 
    if (t === 'addresses') loadAddresses(); 
};

// ==================== ЗАПУСК ====================
initAdmin();
renderAuthScreen();
</script>
</body>
</html>
