<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poiret One',cursive;background:#D56989;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .frame{max-width:1300px;width:100%;background:#F3EEF1;padding:30px;box-shadow:0 20px 35px rgba(0,0,0,0.5)}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;margin-bottom:30px;padding:25px 30px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;position:relative}
        .header::before,.bottom-block::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(153,86,113,0.5)}
        .logo,.nav,.bottom-block>*{position:relative;z-index:1}
        .logo{font-size:36px;font-weight:600;color:#C2DC80;text-decoration:none}
        .nav{display:flex;flex-wrap:wrap;gap:20px}
        .nav a{color:#C2DC80;text-decoration:none;font-size:20px}
        .access-denied{text-align:center;padding:60px;background:#D56989;color:#F3EEF1}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:#D56989;padding:20px;text-align:center;color:#F3EEF1}
        .stat-number{font-size:36px;font-weight:bold}
        .section-title{font-size:24px;color:#D56989;margin:30px 0 15px;border-left:4px solid #C2DC80;padding-left:15px}
        .table-wrapper{overflow-x:auto}
        .data-table{width:100%;border-collapse:collapse;font-size:14px}
        .data-table th,.data-table td{padding:12px 8px;border-bottom:1px solid #C2DC80;text-align:left}
        .data-table th{background:#C2DC80;color:#D56989}
        .badge-admin{background:#C2DC80;color:#D56989;padding:2px 10px;font-size:11px}
        .bottom-block{background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin-top:40px;padding:30px 20px 20px;position:relative}
        .footer-info{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;color:#C2DC80;margin:15px 0 30px;font-size:18px}
        .social-links{display:flex;justify-content:center;gap:35px;flex-wrap:wrap;margin-bottom:20px}
        .social-link{color:#C2DC80;text-decoration:none;font-size:20px;padding:6px 18px}
        .social-link:hover{background:rgba(193,130,146,0.35)}
        .copyright{text-align:center;font-size:15px;color:#C2DC80}
        @media(max-width:700px){.frame{padding:20px}.header{flex-direction:column;text-align:center}.footer-info{flex-direction:column;gap:15px;text-align:center}}
    </style>
</head>
<body>
<div class="frame">
    <div class="header"><a href="index.html" class="logo">Estética Админ</a><div class="nav"><a href="index.html">ГЛАВНАЯ</a><a href="index2.html">КАТАЛОГ</a><a href="index5.html">КОНТАКТЫ</a><a href="index3.html">КОРЗИНА</a><a href="index4.html">КАБИНЕТ</a></div></div>
    <h1 style="font-size:32px;color:#C2DC80;margin-bottom:28px;border-left:5px solid #C2DC80;padding-left:18px;">👑 Админ-панель</h1>
    <div id="adminContent"></div>
    <div class="bottom-block"><div class="footer-info"><span>✦ Цветы, которых нет у других</span><span>✦ Эксклюзив в каждом стебле</span><span>✦ Скажут больше, чем слова</span></div><div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">📘 ВКонтакте</a><a href="https://instagram.com" target="_blank" class="social-link">📷 Instagram</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">💬 WhatsApp</a></div><div class="copyright">© 2026 Estética — Цветочная мастерская</div></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzPREh-SxEeav_K2cH2Snwer7DRkonwlT5_Jy0asTS4bU5av2o7LdlSWgLnA-TNgjUR/exec';

let currentUser = null;

async function apiGet(action, params = {}) {
    try {
        let url = `${API_URL}?action=${action}`;
        for (let key in params) {
            url += `&${key}=${encodeURIComponent(params[key])}`;
        }
        const response = await fetch(url);
        return await response.json();
    } catch(e) {
        console.error('API Error:', e);
        return { success: false, error: 'Ошибка соединения' };
    }
}

async function apiPost(action, data = {}) {
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, ...data })
        });
        return await response.json();
    } catch(e) {
        console.error('API Error:', e);
        return { success: false, error: 'Ошибка соединения' };
    }
}

async function getCurrentUser() {
    const saved = localStorage.getItem('estetica_current_user');
    if (saved) {
        currentUser = JSON.parse(saved);
        if (currentUser.email) {
            const result = await apiGet('getUser', { email: currentUser.email });
            if (result.success && result.data) {
                currentUser = result.data;
                localStorage.setItem('estetica_current_user', JSON.stringify(currentUser));
            }
        }
    }
    return currentUser;
}

async function loadData() {
    await getCurrentUser();
    
    if (!currentUser || !currentUser.isAdmin) {
        document.getElementById('adminContent').innerHTML = `
            <div class="access-denied">
                <h2>🚫 Доступ запрещён</h2>
                <p>У вас нет прав администратора для доступа к этой странице.</p>
                <p><a href="index4.html" style="color:#C2DC80;">← Вернуться в личный кабинет</a></p>
            </div>
        `;
        return;
    }
    
    // Загружаем данные
    const [usersRes, ordersRes, messagesRes] = await Promise.all([
        apiGet('getUsers'),
        apiGet('getOrders'),
        apiGet('getMessages')
    ]);
    
    const users = usersRes.success ? usersRes.data : [];
    const orders = ordersRes.success ? ordersRes.data : [];
    const messages = messagesRes.success ? messagesRes.data : [];
    
    // Статистика
    const stats = {
        totalOrders: orders.length,
        totalRevenue: orders.reduce((s,o) => s + (o.total || 0), 0),
        newOrders: orders.filter(o => o.status === '🟢 Новый').length,
        totalUsers: users.length,
        totalAdmins: users.filter(u => u.isAdmin === true).length
    };
    
    // Пользователи
    let usersHtml = `<div class="section-title">👥 Зарегистрированные пользователи (${users.length})</div>`;
    if (users.length === 0) {
        usersHtml += `<div style="text-align:center;padding:20px;color:#D56989;">Пока нет зарегистрированных пользователей</div>`;
    } else {
        usersHtml += `<div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Заказов</th><th>Статус</th></tr></thead><tbody>`;
        for (let user of users) {
            usersHtml += `<tr><td>${user.id}</td><td>${user.name}</td><td>${user.email}</td><td>${user.phone || '—'}</td><td>${user.orders ? user.orders.length : 0}</td><td>${user.isAdmin ? '<span class="badge-admin">Админ</span>' : 'Пользователь'}</td></tr>`;
        }
        usersHtml += `</tbody></table></div>`;
    }
    
    // Заказы
    let ordersHtml = `<div class="section-title">📋 Все заказы (${orders.length})</div>`;
    if (orders.length === 0) {
        ordersHtml += `<div style="text-align:center;padding:20px;color:#D56989;">Заказов пока нет</div>`;
    } else {
        ordersHtml += `<div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Дата</th><th>Покупатель</th><th>Товары</th><th>Сумма</th><th>Статус</th><th>Адрес</th></tr></thead><tbody>`;
        for (let order of orders) {
            ordersHtml += `<tr><td>${order.id}</td><td>${order.date}</td><td>${order.userEmail || 'Гость'}</td><td>${order.items?.map(i => `${i.name} x${i.quantity}`).join('<br>') || '—'}</td><td>${order.total} ₽</td><td><span style="background:#ff6b6b;color:white;padding:3px 10px;">${order.status || '🟢 Новый'}</span></td><td>${order.address || '—'}</td></tr>`;
        }
        ordersHtml += `</tbody></table></div>`;
    }
    
    // Сообщения
    let messagesHtml = `<div class="section-title">✉️ Сообщения из формы контактов (${messages.length})</div>`;
    if (messages.length === 0) {
        messagesHtml += `<div style="text-align:center;padding:20px;color:#D56989;">Сообщений пока нет</div>`;
    } else {
        messagesHtml += `<div class="table-wrapper"><table class="data-table"><thead><tr><th>Дата</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Сообщение</th></tr></thead><tbody>`;
        for (let msg of messages) {
            messagesHtml += `<tr><td>${msg.date}</td><td>${msg.name}</td><td>${msg.email}</td><td>${msg.phone || '—'}</td><td style="max-width:300px;">${msg.message}</td></tr>`;
        }
        messagesHtml += `</tbody></table></div>`;
    }
    
    document.getElementById('adminContent').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <span style="color:#D56989;">👑 ${currentUser.name} (${currentUser.email}) <span class="badge-admin">Администратор</span></span>
            <button onclick="location.href='index4.html'" style="background:#D56989;color:white;border:none;padding:8px 20px;cursor:pointer;">🚪 Выйти</button>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number">${stats.totalOrders}</div><div class="stat-label">📦 Заказов</div></div>
            <div class="stat-card"><div class="stat-number">${stats.newOrders}</div><div class="stat-label">🟢 Новых</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalRevenue} ₽</div><div class="stat-label">💰 Выручка</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalUsers}</div><div class="stat-label">👥 Пользователей</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalAdmins}</div><div class="stat-label">👑 Админов</div></div>
        </div>
        ${usersHtml}
        ${ordersHtml}
        ${messagesHtml}
    `;
}

loadData();
</script>
</body>
</html>
