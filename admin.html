<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poiret One',cursive;background:#D56989;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .frame{max-width:1300px;width:100%;background:#F3EEF1;padding:30px;box-shadow:0 20px 35px rgba(0,0,0,0.5)}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;margin-bottom:30px;padding:25px 30px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;position:relative}
        .header::before,.bottom-block::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(153,86,113,0.5)}
        .logo,.nav,.bottom-block>*{position:relative;z-index:1}
        .logo{font-size:36px;font-weight:600;color:#C2DC80;text-decoration:none}
        .nav{display:flex;flex-wrap:wrap;gap:20px}
        .nav a{color:#C2DC80;text-decoration:none;font-size:20px}
        .access-denied{text-align:center;padding:60px;background:#D56989;color:#F3EEF1}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:#D56989;padding:20px;text-align:center;color:#F3EEF1;border-radius:12px}
        .stat-number{font-size:36px;font-weight:bold}
        .section-title{font-size:24px;color:#D56989;margin:30px 0 15px;border-left:4px solid #C2DC80;padding-left:15px}
        .table-wrapper{overflow-x:auto}
        .data-table{width:100%;border-collapse:collapse;font-size:14px}
        .data-table th,.data-table td{padding:12px 8px;border-bottom:1px solid #C2DC80;text-align:left}
        .data-table th{background:#C2DC80;color:#D56989}
        .badge-admin{background:#C2DC80;color:#D56989;padding:2px 10px;font-size:11px;border-radius:20px}
        .btn-small{background:#D56989;border:none;padding:5px 12px;font-family:inherit;font-size:12px;cursor:pointer;color:#F3EEF1;border-radius:20px;margin:2px}
        .btn-small:hover{background:#b84d6e}
        .bottom-block{background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin-top:40px;padding:30px 20px 20px;position:relative}
        .footer-info{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;color:#C2DC80;margin:15px 0 30px;font-size:18px}
        .social-links{display:flex;justify-content:center;gap:35px;flex-wrap:wrap;margin-bottom:20px}
        .social-link{color:#C2DC80;text-decoration:none;font-size:20px;padding:6px 18px;transition:.2s}
        .social-link:hover{background:rgba(193,130,146,0.35);transform:translateY(-2px)}
        .copyright{text-align:center;font-size:15px;color:#C2DC80}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center}
        .modal-content{background:#F3EEF1;padding:30px;max-width:500px;width:90%;border:2px solid #C2DC80}
        .modal-content h3{color:#D56989;margin-bottom:20px}
        .modal-content input,.modal-content select,.modal-content textarea{width:100%;padding:10px;margin:10px 0;border:1px solid #C2DC80;font-family:inherit;background:#F3EEF1;color:#D56989}
        .modal-content button{background:#D56989;color:#F3EEF1;border:none;padding:10px;cursor:pointer;margin-top:10px}
        .toast{position:fixed;bottom:30px;right:30px;background:#1f5437;color:white;padding:12px 24px;font-family:system-ui;font-size:14px;z-index:1000;animation:slideIn .3s;border-radius:50px}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        @media(max-width:700px){.frame{padding:20px}.header{flex-direction:column;text-align:center}.footer-info{flex-direction:column;gap:15px;text-align:center}}
    </style>
</head>
<body>
<div class="frame">
    <div class="header"><a href="index.html" class="logo">Estética Админ</a><div class="nav"><a href="index.html">ГЛАВНАЯ</a><a href="index2.html">КАТАЛОГ</a><a href="index5.html">КОНТАКТЫ</a><a href="index3.html">КОРЗИНА</a><a href="index4.html">КАБИНЕТ</a></div></div>
    <h1 style="font-size:32px;color:#C2DC80;margin-bottom:28px;border-left:5px solid #C2DC80;padding-left:18px;">👑 Админ-панель</h1>
    
    <!-- Модальное окно для редактирования товара -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Редактировать товар</h3>
            <input type="text" id="productName" placeholder="Название">
            <input type="number" id="productPrice" placeholder="Цена">
            <input type="text" id="productImg" placeholder="URL фото">
            <textarea id="productDesc" placeholder="Описание" rows="3"></textarea>
            <select id="productCategory">
                <option value="bright">Яркие букеты</option>
                <option value="gentle">Нежные букеты</option>
                <option value="minimalism">Минимализм</option>
                <option value="single">Единичная позиция</option>
            </select>
            <button onclick="saveProduct()">💾 Сохранить</button>
            <button onclick="closeModal()">❌ Отмена</button>
        </div>
    </div>

    <div id="adminContent"></div>
    <div class="bottom-block"><div class="footer-info"><span>✦ Цветы, которых нет у других</span><span>✦ Эксклюзив в каждом стебле</span><span>✦ Скажут больше, чем слова</span></div><div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">📘 ВКонтакте</a><a href="https://instagram.com" target="_blank" class="social-link">📷 Instagram</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">💬 WhatsApp</a></div><div class="copyright">© 2026 Estética — Цветочная мастерская</div></div>
</div>

<script>
const BIN_ID = '6a0e46146877513b27a708ce';
const MASTER_KEY = '$2a$10$HCH9Xf3UP6Dl1.e9yCDKeO2t9wmeo7tBLhtrewQUQb6YW2q5uQ.ju';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let currentUser = null;
let editingProductId = null;

async function getData() {
    const res = await fetch(API_URL, { headers: { 'X-Master-Key': MASTER_KEY } });
    const data = await res.json();
    return data.record || { users: [], orders: [], messages: [], products: [] };
}

async function saveData(data) {
    await fetch(API_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
        body: JSON.stringify(data)
    });
}

async function getCurrentUser() {
    const saved = localStorage.getItem('estetica_current_user');
    if (saved) {
        currentUser = JSON.parse(saved);
        const data = await getData();
        const freshUser = (data.users || []).find(u => u.id === currentUser.id);
        if (freshUser) currentUser = freshUser;
    }
    return currentUser;
}

function showToast(msg) {
    let t = document.querySelector('.toast');
    if (t) t.remove();
    t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// ==================== УПРАВЛЕНИЕ ТОВАРАМИ ====================
async function addProduct() {
    editingProductId = null;
    document.getElementById('modalTitle').innerText = '➕ Добавить товар';
    document.getElementById('productName').value = '';
    document.getElementById('productPrice').value = '';
    document.getElementById('productImg').value = '';
    document.getElementById('productDesc').value = '';
    document.getElementById('productCategory').value = 'bright';
    document.getElementById('productModal').style.display = 'flex';
}

function editProduct(id, name, price, img, desc, cat) {
    editingProductId = id;
    document.getElementById('modalTitle').innerText = '✏️ Редактировать товар';
    document.getElementById('productName').value = name;
    document.getElementById('productPrice').value = price;
    document.getElementById('productImg').value = img;
    document.getElementById('productDesc').value = desc;
    document.getElementById('productCategory').value = cat;
    document.getElementById('productModal').style.display = 'flex';
}

async function saveProduct() {
    const name = document.getElementById('productName').value.trim();
    const price = parseInt(document.getElementById('productPrice').value);
    const img = document.getElementById('productImg').value.trim();
    const desc = document.getElementById('productDesc').value.trim();
    const cat = document.getElementById('productCategory').value;
    
    if (!name || !price || !img) {
        alert('Заполните название, цену и фото!');
        return;
    }
    
    const data = await getData();
    data.products = data.products || [];
    
    if (editingProductId === null) {
        // Новый товар
        const newId = Math.max(...data.products.map(p => p.id), 0) + 1;
        data.products.push({
            id: newId,
            name: name,
            price: price,
            img: img,
            desc: desc,
            cat: cat
        });
        showToast('✅ Товар добавлен!');
    } else {
        // Редактирование
        const index = data.products.findIndex(p => p.id === editingProductId);
        if (index !== -1) {
            data.products[index] = { ...data.products[index], name, price, img, desc, cat };
            showToast('✅ Товар обновлён!');
        }
    }
    
    await saveData(data);
    closeModal();
    renderAdminPanel();
}

async function deleteProduct(id) {
    if (!confirm('Удалить этот товар?')) return;
    const data = await getData();
    data.products = (data.products || []).filter(p => p.id !== id);
    await saveData(data);
    showToast('🗑 Товар удалён');
    renderAdminPanel();
}

function closeModal() {
    document.getElementById('productModal').style.display = 'none';
    editingProductId = null;
}

// ==================== УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ ====================
async function toggleAdmin(userId, currentIsAdmin) {
    const data = await getData();
    const users = data.users || [];
    const userIndex = users.findIndex(u => u.id === userId);
    
    if (userIndex !== -1) {
        users[userIndex].isAdmin = !currentIsAdmin;
        data.users = users;
        await saveData(data);
        showToast(currentIsAdmin ? '🔻 Права админа сняты' : '⭐ Пользователь назначен админом');
        renderAdminPanel();
    }
}

// ==================== ОТОБРАЖЕНИЕ АДМИНКИ ====================
async function renderAdminPanel() {
    await getCurrentUser();
    const container = document.getElementById('adminContent');
    
    if (!currentUser || !currentUser.isAdmin) {
        container.innerHTML = `<div class="access-denied"><h2>🚫 Доступ запрещён</h2><p><a href="index4.html" style="color:#C2DC80;">← Вернуться в кабинет</a></p></div>`;
        return;
    }
    
    const data = await getData();
    const users = data.users || [];
    const orders = data.orders || [];
    const messages = data.messages || [];
    const products = data.products || [];
    
    const stats = {
        totalOrders: orders.length,
        totalRevenue: orders.reduce((s,o) => s + (o.total || 0), 0),
        newOrders: orders.filter(o => o.status === 'Новый').length,
        totalUsers: users.length,
        totalAdmins: users.filter(u => u.isAdmin).length,
        totalProducts: products.length
    };
    
    // Таблица товаров
    let productsHtml = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="section-title">🌸 Каталог товаров (${products.length})</div>
            <button class="btn-small" onclick="addProduct()" style="background:#1f5437; padding:8px 16px;">➕ Добавить товар</button>
        </div>
    `;
    
    if (products.length === 0) {
        productsHtml += '<div style="text-align:center;padding:20px;">Товаров пока нет. Добавьте первый товар!</div>';
    } else {
        productsHtml += `<div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Фото</th><th>Название</th><th>Цена</th><th>Категория</th><th>Действия</th></tr></thead><tbody>`;
        for (let p of products) {
            const catName = {bright:'🔥 Яркие', gentle:'💕 Нежные', minimalism:'🖤 Минимализм', single:'🌿 Единичные'}[p.cat] || p.cat;
            productsHtml += `<tr>
                <td>${p.id}</td>
                <td><img src="${p.img}" style="width:50px;height:50px;object-fit:cover;"></td>
                <td>${p.name}</td>
                <td>${p.price} ₽</td>
                <td>${catName}</td>
                <td><button class="btn-small" onclick='editProduct(${p.id}, "${p.name.replace(/"/g, '&quot;')}", ${p.price}, "${p.img.replace(/"/g, '&quot;')}", "${p.desc.replace(/"/g, '&quot;')}", "${p.cat}")'>✏️</button>
                <button class="btn-small" onclick="deleteProduct(${p.id})">🗑</button></td>
            </tr>`;
        }
        productsHtml += `</tbody></table></div>`;
    }
    
    // Таблица пользователей с кнопкой назначения админа
    let usersHtml = `<div class="section-title">👥 Пользователи (${users.length})</div>`;
    if (users.length === 0) {
        usersHtml += '<div style="text-align:center;padding:20px;">Пока нет пользователей</div>';
    } else {
        usersHtml += `<div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Заказов</th><th>Статус</th><th>Действия</th></tr></thead><tbody>`;
        for (let u of users) {
            usersHtml += `<tr>
                <td>${u.id}</td>
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td>${u.phone || '-'}</td>
                <td>${u.orders?.length || 0}</td>
                <td>${u.isAdmin ? '<span class="badge-admin">👑 Админ</span>' : '👤 Пользователь'}</td>
                <td><button class="btn-small" onclick="toggleAdmin(${u.id}, ${u.isAdmin})">${u.isAdmin ? '🔻 Снять права' : '⭐ Назначить админом'}</button></td>
            </tr>`;
        }
        usersHtml += `</tbody></table></div>`;
    }
    
    // Заказы
    let ordersHtml = `<div class="section-title">📋 Заказы (${orders.length})</div>`;
    if (orders.length === 0) {
        ordersHtml += '<div style="text-align:center;padding:20px;">Заказов пока нет</div>';
    } else {
        ordersHtml += `<div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Дата</th><th>Покупатель</th><th>Товары</th><th>Сумма</th><th>Адрес</th></tr></thead><tbody>`;
        for (let o of orders) {
            ordersHtml += `<tr>
                <td>${o.id}</td>
                <td>${o.date}</td>
                <td>${o.userEmail || 'Гость'}</td>
                <td>${o.items?.map(i => `${i.name} x${i.quantity}`).join('<br>') || '-'}</td>
                <td>${o.total} ₽</td>
                <td>${o.address || '-'}</td>
            </tr>`;
        }
        ordersHtml += `</tbody><table></div>`;
    }
    
    // Сообщения
    let messagesHtml = `<div class="section-title">✉️ Сообщения (${messages.length})</div>`;
    if (messages.length === 0) {
        messagesHtml += '<div style="text-align:center;padding:20px;">Сообщений пока нет</div>';
    } else {
        messagesHtml += `<div class="table-wrapper"><table class="data-table"><thead><tr><th>Дата</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Сообщение</th></tr></thead><tbody>`;
        for (let m of messages) {
            messagesHtml += `<tr>
                <td>${m.date}</td>
                <td>${m.name}</td>
                <td>${m.email}</td>
                <td>${m.phone || '-'}</td>
                <td style="max-width:300px;">${m.message}</td>
            </tr>`;
        }
        messagesHtml += `</tbody></table></div>`;
    }
    
    container.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <span style="color:#D56989;">👑 ${currentUser.name} (${currentUser.email}) <span class="badge-admin">Администратор</span></span>
            <button onclick="location.href='index4.html'" style="background:#D56989;color:white;border:none;padding:8px 20px;cursor:pointer;border-radius:40px;">🚪 Выйти</button>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number">${stats.totalProducts}</div><div class="stat-label">🌸 Товаров</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalOrders}</div><div class="stat-label">📦 Заказов</div></div>
            <div class="stat-card"><div class="stat-number">${stats.newOrders}</div><div class="stat-label">🟢 Новых</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalRevenue} ₽</div><div class="stat-label">💰 Выручка</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalUsers}</div><div class="stat-label">👥 Пользователей</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalAdmins}</div><div class="stat-label">👑 Админов</div></div>
        </div>
        ${productsHtml}
        ${usersHtml}
        ${ordersHtml}
        ${messagesHtml}
    `;
}

// Обновляем каталог на странице index2.html после редактирования
window.updateCatalogOnSite = async function() {
    const data = await getData();
    localStorage.setItem('estetica_products', JSON.stringify(data.products || []));
};

renderAdminPanel();
</script>
</body>
</html>
