<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poiret One', cursive; background: #D56989; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .frame { max-width: 1300px; width: 100%; background: #F3EEF1; padding: 30px; box-shadow: 0 20px 35px rgba(0,0,0,0.5); }
        .header, .bottom-block { position: relative; background-size: cover; background-position: center; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; padding: 25px 30px; background-image: url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg'); }
        .header::before, .bottom-block::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(153,86,113,0.5); }
        .logo, .nav, .bottom-block > * { position: relative; z-index: 1; }
        .logo { font-size: 36px; font-weight: 600; color: #C2DC80; text-decoration: none; text-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        .nav { display: flex; flex-wrap: wrap; gap: 20px; }
        .nav a { color: #C2DC80; text-decoration: none; font-size: 20px; transition: 0.2s; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
        .access-denied { text-align: center; padding: 60px; background: #D56989; color: #F3EEF1; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #D56989; padding: 20px; text-align: center; color: #F3EEF1; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-number { font-size: 36px; font-weight: bold; }
        .section-title { font-size: 24px; color: #D56989; margin: 30px 0 15px; border-left: 4px solid #C2DC80; padding-left: 15px; }
        .table-wrapper { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table th, .data-table td { padding: 12px 8px; border-bottom: 1px solid #C2DC80; text-align: left; }
        .data-table th { background: #C2DC80; color: #D56989; }
        .status-select { padding: 5px 10px; border-radius: 0; border: none; font-family: inherit; cursor: pointer; }
        .delete-btn { background: none; border: none; color: #D56989; cursor: pointer; font-size: 20px; }
        .badge-admin { background: #C2DC80; color: #D56989; padding: 2px 10px; font-size: 11px; }
        .bottom-block { background-image: url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg'); margin-top: 40px; padding: 30px 20px 20px; }
        .footer-info { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; color: #C2DC80; margin: 15px 0 30px; font-size: 18px; }
        .social-links { display: flex; justify-content: center; gap: 35px; flex-wrap: wrap; margin-bottom: 20px; }
        .social-link { color: #C2DC80; text-decoration: none; font-size: 20px; padding: 6px 18px; transition: 0.2s; }
        .social-link:hover { background: rgba(193,130,146,0.35); transform: translateY(-2px); }
        .copyright { text-align: center; font-size: 15px; color: #C2DC80; }
        @media (max-width: 700px) { .frame { padding: 20px; } .header { flex-direction: column; text-align: center; } .logo { font-size: 28px; } .nav a { font-size: 16px; } .footer-info { flex-direction: column; gap: 15px; text-align: center; } .social-link { font-size: 16px; } }
    </style>
</head>
<body>
<div class="frame">
    <div class="header"><a href="index.html" class="logo">Estética Админ</a><div class="nav"><a href="index.html">ГЛАВНАЯ</a><a href="index2.html">КАТАЛОГ</a><a href="index5.html">КОНТАКТЫ</a><a href="index3.html">КОРЗИНА</a><a href="index4.html">КАБИНЕТ</a></div></div>
    <h1 style="font-size:32px;color:#C2DC80;margin-bottom:28px;border-left:5px solid #C2DC80;padding-left:18px;">👑 Админ-панель</h1>
    <div id="adminContent"></div>
    <div class="bottom-block"><div class="footer-info"><span>✦ Цветы, которых нет у других</span><span>✦ Эксклюзив в каждом стебле</span><span>✦ Скажут больше, чем слова</span></div><div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">📘 ВКонтакте</a><a href="https://instagram.com" target="_blank" class="social-link">📷 Instagram</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">💬 WhatsApp</a></div><div class="copyright">© 2026 Estética — Цветочная мастерская</div></div>
</div>
<script>
    function getUsers() { return JSON.parse(localStorage.getItem('estetica_users') || '[]'); }
    function saveUsers(u) { localStorage.setItem('estetica_users', JSON.stringify(u)); }
    function getCurrentUser() { return JSON.parse(localStorage.getItem('estetica_current_user') || 'null'); }
    function getGuestOrders() { return JSON.parse(localStorage.getItem('estetica_guest_orders') || '[]'); }
    function saveGuestOrders(o) { localStorage.setItem('estetica_guest_orders', JSON.stringify(o)); }
    function getMessages() { return JSON.parse(localStorage.getItem('estetica_contact_messages') || '[]'); }
    function saveMessages(m) { localStorage.setItem('estetica_contact_messages', JSON.stringify(m)); }
    function isAdmin() { const u = getCurrentUser(); return u && u.isAdmin === true; }
    function getAllOrders() { let o = []; getUsers().forEach(u=>{ if(u.orders) u.orders.forEach(o=>o.userEmail=u.email); o.push(...(u.orders||[])); }); o.push(...getGuestOrders()); return o.sort((a,b)=>b.id-a.id); }
    function updateOrderStatus(id,st) { let u = getUsers(); let upd = false; for(let i=0;i<u.length;i++) if(u[i].orders) { let idx = u[i].orders.findIndex(o=>o.id==id); if(idx!==-1) { u[i].orders[idx].status = st; upd = true; break; } } upd ? saveUsers(u) : (()=>{ let g = getGuestOrders(); let idx = g.findIndex(o=>o.id==id); if(idx!==-1) { g[idx].status = st; saveGuestOrders(g); } })(); renderAdmin(); }
    function deleteOrder(id) { if(!confirm('Удалить заказ?')) return; let u = getUsers(); let del = false; for(let i=0;i<u.length;i++) if(u[i].orders) { let l = u[i].orders.length; u[i].orders = u[i].orders.filter(o=>o.id!=id); if(u[i].orders.length!==l) del = true; } del ? saveUsers(u) : (()=>{ let g = getGuestOrders().filter(o=>o.id!=id); saveGuestOrders(g); })(); renderAdmin(); }
    function deleteUser(id) { if(!confirm('Удалить пользователя?')) return; if(getCurrentUser()?.id==id) return alert('Нельзя удалить себя!'); saveUsers(getUsers().filter(u=>u.id!=id)); renderAdmin(); }
    function makeAdmin(id) { let u = getUsers(); let idx = u.findIndex(u=>u.id==id); if(idx!==-1) { u[idx].isAdmin = true; saveUsers(u); renderAdmin(); } }
    function removeAdmin(id) { if(getCurrentUser()?.id==id) return alert('Нельзя снять права с себя!'); let u = getUsers(); let idx = u.findIndex(u=>u.id==id); if(idx!==-1) { u[idx].isAdmin = false; saveUsers(u); renderAdmin(); } }
    function deleteMessage(id) { if(confirm('Удалить сообщение?')) saveMessages(getMessages().filter(m=>m.id!=id)); renderAdmin(); }
    function getStats() { let o = getAllOrders(); let u = getUsers(); return { total: o.length, revenue: o.reduce((s,i)=>s+(i.total||0),0), newOrders: o.filter(o=>o.status==='🟢 Новый').length, users: u.length, admins: u.filter(u=>u.isAdmin).length }; }
    function statusColor(s) { if(s==='🟢 Новый') return '#ff6b6b'; if(s==='🟡 В обработке') return '#ffa502'; if(s==='✅ Доставлен') return '#2ed573'; return '#747d8c'; }
    function renderAdmin() {
        const cont = document.getElementById('adminContent');
        if(!isAdmin()) { cont.innerHTML = `<div class="access-denied"><h2>🚫 Доступ запрещён</h2><p><a href="index4.html" style="color:#C2DC80;">← Вернуться в кабинет</a></p></div>`; return; }
        const cu = getCurrentUser(), stats = getStats(), orders = getAllOrders(), msgs = getMessages(), users = getUsers();
        cont.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:20px;"><span style="color:#D56989;">👑 ${cu.name} (${cu.email}) <span class="badge-admin">Администратор</span></span><button class="delete-btn" onclick="window.location.href='index4.html'" style="background:#D56989;color:white;padding:8px 20px;">🚪 Выйти в профиль</button></div>
        <div class="stats-grid"><div class="stat-card"><div class="stat-number">${stats.total}</div><div class="stat-label">📦 Заказов</div></div><div class="stat-card"><div class="stat-number">${stats.newOrders}</div><div class="stat-label">🟢 Новых</div></div><div class="stat-card"><div class="stat-number">${stats.revenue} ₽</div><div class="stat-label">💰 Выручка</div></div><div class="stat-card"><div class="stat-number">${stats.users}</div><div class="stat-label">👥 Пользователей</div></div><div class="stat-card"><div class="stat-number">${stats.admins}</div><div class="stat-label">👑 Админов</div></div></div>
        <div class="section-title">👥 Пользователи (${users.length})</div><div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Заказов</th><th>Статус</th><th>Действия</th></tr></thead><tbody>${users.map(u=>`<tr><td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.phone||'-'}</td><td>${u.orders?.length||0}</td><td>${u.isAdmin ? '<span class="badge-admin">👑 Админ</span>' : '👤 Пользователь'}</td><td>${!u.isAdmin ? `<button class="delete-btn" onclick="makeAdmin(${u.id})" style="background:#C2DC80;padding:3px 8px;font-size:11px;">⭐ Назначить</button>` : (cu.id!==u.id ? `<button class="delete-btn" onclick="removeAdmin(${u.id})" style="background:#ff6b6b;color:white;padding:3px 8px;font-size:11px;">🔻 Снять</button>` : 'Вы')}<button class="delete-btn" onclick="deleteUser(${u.id})" style="margin-left:8px;">🗑</button></td></tr>`).join('')}</tbody></table></div>
        <div class="section-title">📋 Заказы (${orders.length})</div>${orders.length===0 ? '<div class="access-denied" style="padding:20px;">Заказов нет</div>' : `<div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Дата</th><th>Покупатель</th><th>Товары</th><th>Сумма</th><th>Статус</th><th>Адрес</th><th></th></tr></thead><tbody>${orders.map(o=>`<tr><td>${o.id}</td><td>${o.date||'-'}</td><td>${o.customerName||o.userName||'-'}<br><small>${o.userEmail||'Гость'}</small></td><td>${o.items?.map(i=>`${i.name} x${i.quantity}`).join('<br>')||'-'}</td><td>${o.total} ₽</td><td><select class="status-select" onchange="updateOrderStatus(${o.id},this.value)" style="background:${statusColor(o.status)};color:white;"><option value="🟢 Новый" ${o.status==='🟢 Новый' ? 'selected' : ''}>🟢 Новый</option><option value="🟡 В обработке" ${o.status==='🟡 В обработке' ? 'selected' : ''}>🟡 В обработке</option><option value="✅ Доставлен" ${o.status==='✅ Доставлен' ? 'selected' : ''}>✅ Доставлен</option><option value="❌ Отменён" ${o.status==='❌ Отменён' ? 'selected' : ''}>❌ Отменён</option></select></td><td>${o.address||'-'}</td><td><button class="delete-btn" onclick="deleteOrder(${o.id})">🗑</button></td></tr>`).join('')}</tbody></table></div>`}
        <div class="section-title">✉️ Сообщения (${msgs.length})</div>${msgs.length===0 ? '<div class="access-denied" style="padding:20px;">Сообщений нет</div>' : `<div class="table-wrapper"><table class="data-table"><thead><tr><th>Дата</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Сообщение</th><th></th></tr></thead><tbody>${msgs.map(m=>`<tr><td>${m.date}</td><td>${m.name}</td><td>${m.email}</td><td>${m.phone||'-'}</td><td style="max-width:300px;">${m.message}</td><td><button class="delete-btn" onclick="deleteMessage(${m.id})">🗑</button></td></tr>`).join('')}</tbody></table></div>`}`;
    }
    window.updateOrderStatus = updateOrderStatus; window.deleteOrder = deleteOrder; window.deleteUser = deleteUser; window.makeAdmin = makeAdmin; window.removeAdmin = removeAdmin; window.deleteMessage = deleteMessage;
    renderAdmin();
</script>
</body>
</html>
