<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poiret One',cursive;background:#D56989;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .frame{max-width:1300px;width:100%;background:#F3EEF1;padding:30px;box-shadow:0 20px 35px rgba(0,0,0,0.5)}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;margin-bottom:30px;padding:25px 30px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;position:relative}
        .header::before,.bottom-block::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(153,86,113,0.5)}
        .logo,.nav,.bottom-block>*{position:relative;z-index:1}
        .logo{font-size:36px;font-weight:600;color:#C2DC80;text-decoration:none}
        .nav{display:flex;flex-wrap:wrap;gap:20px}
        .nav a{color:#C2DC80;text-decoration:none;font-size:20px}
        .access-denied{text-align:center;padding:60px;background:#D56989;color:#F3EEF1}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:#D56989;padding:20px;text-align:center;color:#F3EEF1}
        .stat-number{font-size:36px;font-weight:bold}
        .section-title{font-size:24px;color:#D56989;margin:30px 0 15px;border-left:4px solid #C2DC80;padding-left:15px}
        .table-wrapper{overflow-x:auto}
        .data-table{width:100%;border-collapse:collapse;font-size:14px}
        .data-table th,.data-table td{padding:12px 8px;border-bottom:1px solid #C2DC80;text-align:left}
        .data-table th{background:#C2DC80;color:#D56989}
        .badge-admin{background:#C2DC80;color:#D56989;padding:2px 10px;font-size:11px}
        .bottom-block{background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin-top:40px;padding:30px 20px 20px;position:relative}
        .footer-info{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;color:#C2DC80;margin:15px 0 30px;font-size:18px}
        .social-links{display:flex;justify-content:center;gap:35px;flex-wrap:wrap;margin-bottom:20px}
        .social-link{color:#C2DC80;text-decoration:none;font-size:20px;padding:6px 18px}
        .social-link:hover{background:rgba(193,130,146,0.35)}
        .copyright{text-align:center;font-size:15px;color:#C2DC80}
        @media(max-width:700px){.frame{padding:20px}.header{flex-direction:column;text-align:center}.footer-info{flex-direction:column;gap:15px;text-align:center}}
    </style>
</head>
<body>
<div class="frame">
    <div class="header"><a href="index.html" class="logo">Estética Админ</a><div class="nav"><a href="index.html">ГЛАВНАЯ</a><a href="index2.html">КАТАЛОГ</a><a href="index5.html">КОНТАКТЫ</a><a href="index3.html">КОРЗИНА</a><a href="index4.html">КАБИНЕТ</a></div></div>
    <h1 style="font-size:32px;color:#C2DC80;margin-bottom:28px;border-left:5px solid #C2DC80;padding-left:18px;">👑 Админ-панель</h1>
    <div id="adminContent"></div>
    <div class="bottom-block"><div class="footer-info"><span>✦ Цветы, которых нет у других</span><span>✦ Эксклюзив в каждом стебле</span><span>✦ Скажут больше, чем слова</span></div><div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">📘 ВКонтакте</a><a href="https://instagram.com" target="_blank" class="social-link">📷 Instagram</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">💬 WhatsApp</a></div><div class="copyright">© 2026 Estética — Цветочная мастерская</div></div>
</div>

<script>
// ==================== ФУНКЦИИ ДЛЯ РАБОТЫ С ДАННЫМИ ====================
function getUsers() {
    try {
        const data = localStorage.getItem('estetica_users');
        console.log('📦 Данные из localStorage (estetica_users):', data);
        return data ? JSON.parse(data) : [];
    } catch(e) {
        console.error('Ошибка парсинга estetica_users:', e);
        return [];
    }
}

function getCurrentUser() {
    try {
        const data = localStorage.getItem('estetica_current_user');
        return data ? JSON.parse(data) : null;
    } catch(e) {
        console.error('Ошибка парсинга estetica_current_user:', e);
        return null;
    }
}

function getGuestOrders() {
    try {
        const data = localStorage.getItem('estetica_guest_orders');
        return data ? JSON.parse(data) : [];
    } catch(e) {
        return [];
    }
}

function getAllOrders() {
    const users = getUsers();
    const guestOrders = getGuestOrders();
    let orders = [];
    
    // Заказы зарегистрированных пользователей
    users.forEach(user => {
        if (user.orders && Array.isArray(user.orders) && user.orders.length > 0) {
            user.orders.forEach(order => {
                orders.push({
                    ...order,
                    userEmail: user.email,
                    userName: user.name,
                    userType: '👤 Зарегистрированный'
                });
            });
        }
    });
    
    // Гостевые заказы
    if (guestOrders.length > 0) {
        guestOrders.forEach(order => {
            orders.push({
                ...order,
                userEmail: 'Гость',
                userName: order.customerName || 'Гость',
                userType: '👋 Гость'
            });
        });
    }
    
    return orders.sort((a,b) => (b.id || 0) - (a.id || 0));
}

function getStats() {
    const users = getUsers();
    const orders = getAllOrders();
    return {
        totalOrders: orders.length,
        totalRevenue: orders.reduce((sum, order) => sum + (order.total || 0), 0),
        newOrders: orders.filter(o => o.status === '🟢 Новый' || o.status === 'Новый').length,
        totalUsers: users.length,
        totalAdmins: users.filter(u => u.isAdmin === true).length
    };
}

function isAdmin() {
    const user = getCurrentUser();
    return user && user.isAdmin === true;
}

// ==================== ОТОБРАЖЕНИЕ ====================
function renderAdminPanel() {
    const container = document.getElementById('adminContent');
    
    // Проверка прав доступа
    if (!isAdmin()) {
        container.innerHTML = `
            <div class="access-denied">
                <h2>🚫 Доступ запрещён</h2>
                <p>У вас нет прав администратора для доступа к этой странице.</p>
                <p><a href="index4.html" style="color:#C2DC80;">← Вернуться в личный кабинет</a></p>
            </div>
        `;
        return;
    }
    
    const currentAdmin = getCurrentUser();
    const stats = getStats();
    const allOrders = getAllOrders();
    const users = getUsers();
    
    console.log('👥 Найдено пользователей:', users.length, users);
    console.log('📦 Найдено заказов:', allOrders.length);
    
    // Статистика
    const statsHtml = `
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number">${stats.totalOrders}</div><div class="stat-label">📦 Всего заказов</div></div>
            <div class="stat-card"><div class="stat-number">${stats.newOrders}</div><div class="stat-label">🟢 Новых заказов</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalRevenue} ₽</div><div class="stat-label">💰 Общая выручка</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalUsers}</div><div class="stat-label">👥 Пользователей</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalAdmins}</div><div class="stat-label">👑 Администраторов</div></div>
        </div>
    `;
    
    // Таблица пользователей
    let usersHtml = `<div class="section-title">👥 Зарегистрированные пользователи (${users.length})</div>`;
    if (users.length === 0) {
        usersHtml += `<div class="empty-data" style="text-align:center; padding:30px; color:#D56989;">Пользователей пока нет</div>`;
    } else {
        usersHtml += `<div class="table-wrapper"><table class="data-table">
            <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Заказов</th><th>Статус</th></tr></thead>
            <tbody>`;
        for (const user of users) {
            usersHtml += `<tr>
                <td>${user.id}</td>
                <td>${user.name || '—'}</td>
                <td>${user.email || '—'}</td>
                <td>${user.phone || '—'}</td>
                <td>${user.orders ? user.orders.length : 0}</td>
                <td>${user.isAdmin ? '<span class="badge-admin">👑 Админ</span>' : '👤 Пользователь'}</td>
            </tr>`;
        }
        usersHtml += `</tbody></table></div>`;
    }
    
    // Таблица заказов
    let ordersHtml = `<div class="section-title">📋 Все заказы (${allOrders.length})</div>`;
    if (allOrders.length === 0) {
        ordersHtml += `<div class="empty-data" style="text-align:center; padding:30px; color:#D56989;">Заказов пока нет</div>`;
    } else {
        ordersHtml += `<div class="table-wrapper"><table class="data-table">
            <thead><tr><th>ID</th><th>Дата</th><th>Покупатель</th><th>Товары</th><th>Сумма</th><th>Статус</th><th>Адрес</th></tr></thead>
            <tbody>`;
        for (const order of allOrders) {
            ordersHtml += `</tr>
                <td>${order.id}</td>
                <td>${order.date || '—'}</td>
                <td>${order.customerName || order.userName || '—'}<br><small>${order.userEmail || '—'}</small></td>
                <td>${order.items ? order.items.map(i => `${i.name} x${i.quantity}`).join('<br>') : '—'}</td>
                <td>${order.total || 0} ₽</td>
                <td><span style="background:#ff6b6b; color:white; padding:3px 10px; display:inline-block;">${order.status || '🟢 Новый'}</span></td>
                <td>${order.address || '—'}</td>
            </tr>`;
        }
        ordersHtml += `</tbody></table></div>`;
    }
    
    // Собираем всё вместе
    container.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span style="color: #D56989;">👑 ${currentAdmin.name} (${currentAdmin.email}) <span class="badge-admin">Администратор</span></span>
            <button onclick="location.href='index4.html'" style="background: #D56989; color: white; border: none; padding: 8px 20px; cursor: pointer;">🚪 Выйти</button>
        </div>
        ${statsHtml}
        ${usersHtml}
        ${ordersHtml}
    `;
}

// Запуск
renderAdminPanel();
</script>
</body>
</html>
