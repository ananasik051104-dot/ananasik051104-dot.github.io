<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poiret One',cursive;background:#D56989;padding:15px}
        .frame{max-width:1300px;margin:0 auto;background:#F3EEF1;padding:25px;box-shadow:0 20px 35px rgba(0,0,0,0.5)}
        .header{display:flex;justify-content:space-between;flex-wrap:wrap;gap:15px;margin-bottom:25px;padding:15px 20px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;position:relative}
        .header::before,.bottom-block::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(153,86,113,0.5)}
        .logo,.nav,.bottom-block>*{position:relative;z-index:1}
        .logo{font-size:28px;font-weight:600;color:#C2DC80;text-decoration:none}
        .nav{display:flex;flex-wrap:wrap;gap:8px}
        .nav a{color:#C2DC80;text-decoration:none;font-size:14px;padding:6px 10px}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;margin-bottom:25px}
        .stat-card{background:#D56989;padding:15px;text-align:center;color:#F3EEF1}
        .stat-number{font-size:32px;font-weight:bold}
        .section-title{font-size:22px;color:#D56989;margin:25px 0 12px;border-left:4px solid #C2DC80;padding-left:12px}
        .table-wrapper{overflow-x:auto}
        .data-table{width:100%;border-collapse:collapse;font-size:13px}
        .data-table th,.data-table td{padding:10px 6px;border-bottom:1px solid #C2DC80;text-align:left}
        .data-table th{background:#C2DC80;color:#D56989}
        .badge-admin{background:#C2DC80;color:#D56989;padding:2px 8px;font-size:11px}
        .btn-small{background:#D56989;border:none;padding:4px 10px;font-family:inherit;cursor:pointer;color:#F3EEF1;margin:2px}
        .btn-small:hover{background:#b84d6e}
        .bottom-block{background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin-top:30px;padding:20px 15px 15px;position:relative}
        .footer-info{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;color:#C2DC80;font-size:12px}
        .social-links{display:flex;justify-content:center;gap:15px;margin-bottom:12px}
        .social-link{color:#C2DC80;text-decoration:none}
        .copyright{text-align:center;font-size:10px;color:#C2DC80}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center}
        .modal-content{background:#F3EEF1;padding:20px;max-width:500px;width:90%;max-height:85vh;overflow-y:auto}
        .modal-content h3{color:#D56989}
        .modal-content input,.modal-content select,.modal-content textarea{width:100%;padding:8px;margin:8px 0;border:1px solid #C2DC80;font-family:inherit;background:#F3EEF1}
        .modal-content button{background:#D56989;color:#F3EEF1;border:none;padding:8px;cursor:pointer}
        .toast{position:fixed;bottom:20px;left:20px;right:20px;background:#1f5437;color:white;padding:10px;text-align:center;z-index:1001;animation:slideIn .3s}
        .loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:9999;color:white;flex-direction:column}
        .spinner{width:50px;height:50px;border:3px solid #C2DC80;border-top-color:#D56989;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes slideIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @media(max-width:700px){.frame{padding:15px}.header{flex-direction:column;text-align:center}}
    </style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div>Загрузка админ-панели...</div>

<div class="frame">
    <div class="header"><a href="index.html" class="logo">Estética Админ</a><div class="nav"><a href="index.html">ГЛАВНАЯ</a><a href="index2.html">КАТАЛОГ</a><a href="index5.html">КОНТАКТЫ</a><a href="index3.html">КОРЗИНА</a><a href="index4.html">КАБИНЕТ</a></div></div>
    <h1 style="font-size:28px;color:#C2DC80;border-left:5px solid #C2DC80;padding-left:15px;">Админ-панель</h1>
    <div id="adminContent"></div>
    <div class="bottom-block">
        <div class="footer-info"><span>Цветы, которых нет у других</span><span>Эксклюзив в каждом стебле</span><span>Скажут больше, чем слова</span></div>
        <div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">ВКонтакте</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">WhatsApp</a></div>
        <div class="copyright">2026 Estética Цветочная мастерская</div>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Редактировать товар</h3>
        <input type="text" id="productName" placeholder="Название">
        <input type="number" id="productPrice" placeholder="Цена">
        <input type="text" id="productImg" placeholder="URL фото">
        <textarea id="productDesc" placeholder="Краткое описание"></textarea>
        <textarea id="productFullDesc" placeholder="Полное описание"></textarea>
        <select id="productCategory">
            <option value="bright">Яркие букеты</option>
            <option value="gentle">Нежные букеты</option>
            <option value="minimalism">Минимализм</option>
            <option value="single">Единичная позиция</option>
        </select>
        <button onclick="saveProduct()">Сохранить</button>
        <button onclick="closeModal()">Отмена</button>
    </div>
</div>

<script>
// ==================== НАСТРОЙКИ JSONBin.io ====================
const JSONBIN_BIN_ID = '6a0e46146877513b27a708ce';
const JSONBIN_API_KEY = '$2a$10$HCH9Xf3UP6Dl1.e9yCDKeO2t9wmeo7tBLhtrewQUQb6YW2q5uQ.ju';

let currentUser = null;
let editingProductId = null;

async function getBin() {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
    });
    const data = await res.json();
    return data.record;
}

async function updateBin(data) {
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
        body: JSON.stringify(data)
    });
}

function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function showToast(msg) { let t = document.querySelector('.toast'); if (t) t.remove(); t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }

// Авторизация
async function login(email, password) {
    const data = await getBin();
    const users = data.users || [];
    const user = users.find(u => u.email === email && u.password === password);
    if (user && user.isAdmin) {
        currentUser = user;
        localStorage.setItem('estetica_current_user', JSON.stringify(currentUser));
        return true;
    }
    return false;
}

function logout() {
    currentUser = null;
    localStorage.removeItem('estetica_current_user');
    renderAdminPanel();
}

// Товары (управление через JSONBin)
async function addProduct() {
    editingProductId = null;
    document.getElementById('modalTitle').innerText = 'Добавить товар';
    document.getElementById('productName').value = '';
    document.getElementById('productPrice').value = '';
    document.getElementById('productImg').value = '';
    document.getElementById('productDesc').value = '';
    document.getElementById('productFullDesc').value = '';
    document.getElementById('productCategory').value = 'bright';
    document.getElementById('productModal').style.display = 'flex';
}

function editProduct(product) {
    editingProductId = product.id;
    document.getElementById('modalTitle').innerText = 'Редактировать товар';
    document.getElementById('productName').value = product.name;
    document.getElementById('productPrice').value = product.price;
    document.getElementById('productImg').value = product.img;
    document.getElementById('productDesc').value = product.short_desc || '';
    document.getElementById('productFullDesc').value = product.full_desc || '';
    document.getElementById('productCategory').value = product.cat || 'bright';
    document.getElementById('productModal').style.display = 'flex';
}

async function saveProduct() {
    const name = document.getElementById('productName').value.trim();
    const price = parseInt(document.getElementById('productPrice').value);
    const img = document.getElementById('productImg').value.trim();
    const short_desc = document.getElementById('productDesc').value.trim();
    const full_desc = document.getElementById('productFullDesc').value.trim();
    const cat = document.getElementById('productCategory').value;
    
    if (!name || !price || !img) { alert('Заполните название, цену и фото'); return; }
    
    const data = await getBin();
    const productData = { id: editingProductId || Date.now(), name, price, img, short_desc, full_desc, cat };
    
    if (editingProductId === null) {
        if (!data.products) data.products = [];
        data.products.push(productData);
    } else {
        const index = data.products.findIndex(p => p.id === editingProductId);
        if (index !== -1) data.products[index] = productData;
    }
    await updateBin(data);
    showToast(editingProductId ? 'Товар обновлён' : 'Товар добавлен');
    closeModal();
    renderAdminPanel();
}

async function deleteProduct(id) {
    if (!confirm('Удалить этот товар?')) return;
    const data = await getBin();
    data.products = data.products.filter(p => p.id !== id);
    await updateBin(data);
    showToast('Товар удалён');
    renderAdminPanel();
}

// Пользователи
async function toggleAdmin(userId, currentIsAdmin) {
    const data = await getBin();
    const users = data.users || [];
    const userIndex = users.findIndex(u => u.id === userId);
    if (userIndex !== -1) {
        users[userIndex].isAdmin = !currentIsAdmin;
        data.users = users;
        await updateBin(data);
        showToast(currentIsAdmin ? 'Права админа сняты' : 'Пользователь назначен админом');
        renderAdminPanel();
    }
}

// Заказы
async function updateOrderStatus(orderId, newStatus) {
    const data = await getBin();
    const orders = data.orders || [];
    const orderIndex = orders.findIndex(o => o.id === orderId);
    if (orderIndex !== -1) {
        orders[orderIndex].status = newStatus;
        data.orders = orders;
        await updateBin(data);
        showToast('Статус заказа обновлён');
        renderAdminPanel();
    }
}

function closeModal() { document.getElementById('productModal').style.display = 'none'; editingProductId = null; }

// Основная отрисовка
async function renderAdminPanel() {
    const saved = localStorage.getItem('estetica_current_user');
    if (saved) {
        try { currentUser = JSON.parse(saved); } catch(e) {}
    }
    
    const isAdmin = currentUser && currentUser.isAdmin;
    if (!currentUser || !isAdmin) {
        document.getElementById('adminContent').innerHTML = `<div style="text-align:center;padding:40px;"><h3>Вход в админ-панель</h3><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Пароль"><button onclick="doLogin()">Войти</button></div>`;
        document.getElementById('loading').style.display = 'none';
        return;
    }
    
    const data = await getBin();
    const products = data.products || [];
    const users = data.users || [];
    const orders = data.orders || [];
    const messages = data.messages || [];
    
    const stats = {
        totalProducts: products.length,
        totalOrders: orders.length,
        newOrders: orders.filter(o => o.status === 'Новый').length,
        totalRevenue: orders.reduce((s,o) => s + (o.total || 0), 0),
        totalUsers: users.length,
        totalAdmins: users.filter(u => u.isAdmin).length
    };
    
    let productsHtml = `<div class="section-title">Каталог товаров (${products.length})</div><div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Фото</th><th>Название</th><th>Цена</th><th>Действия</th></tr></thead><tbody>`;
    products.forEach(p => {
        productsHtml += `<tr><td>${p.id}</td><td><img src="${p.img}" style="width:40px;height:40px;object-fit:cover;"></td><td>${escapeHtml(p.name)}</td><td>${p.price} ₽</td><td><button class="btn-small" onclick='editProduct(${JSON.stringify(p).replace(/'/g, "&#39;")})'>✏️</button><button class="btn-small" onclick="deleteProduct(${p.id})">🗑</button></td></tr>`;
    });
    productsHtml += `</tbody></table></div><div style="margin-top:10px;"><button class="btn-small" onclick="addProduct()" style="background:#1f5437;">+ Добавить товар</button></div>`;
    
    let usersHtml = `<div class="section-title">Пользователи (${users.length})</div><div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Статус</th><th>Действия</th></tr></thead><tbody>`;
    users.forEach(u => {
        const isAdminUser = u.isAdmin;
        usersHtml += `<tr><td>${u.id}</td><td>${escapeHtml(u.name)}</td><td>${escapeHtml(u.email)}</td><td>${escapeHtml(u.phone || '-')}</td><td>${isAdminUser ? '<span class="badge-admin">Админ</span>' : 'Пользователь'}</td><td><button class="btn-small" onclick="toggleAdmin(${u.id}, ${isAdminUser})">${isAdminUser ? 'Снять права' : 'Назначить админом'}</button></td></tr>`;
    });
    usersHtml += `</tbody></tr></div>`;
    
    let ordersHtml = `<div class="section-title">Заказы (${orders.length})</div><div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Дата</th><th>Покупатель</th><th>Сумма</th><th>Статус</th><th>Адрес</th><th>Действия</th></tr></thead><tbody>`;
    orders.forEach(o => {
        ordersHtml += `<tr><td>${o.id}</td><td>${escapeHtml(o.date)}</td><td>${escapeHtml(o.userEmail || 'Гость')}</td><td>${o.total} ₽</td><td><select class="btn-small" onchange="updateOrderStatus(${o.id}, this.value)"><option value="Новый" ${o.status === 'Новый' ? 'selected' : ''}>Новый</option><option value="В обработке" ${o.status === 'В обработке' ? 'selected' : ''}>В обработке</option><option value="Доставлен" ${o.status === 'Доставлен' ? 'selected' : ''}>Доставлен</option><option value="Отменён" ${o.status === 'Отменён' ? 'selected' : ''}>Отменён</option></select></td><td>${escapeHtml(o.address || '-')}</td><td><button class="btn-small" onclick="updateOrderStatus(${o.id}, 'Отменён')">Отменить</button></td></tr>`;
    });
    ordersHtml += `</tbody></table></div>`;
    
    let messagesHtml = `<div class="section-title">Сообщения (${messages.length})</div><div class="table-wrapper"><table class="data-table"><thead><tr><th>Дата</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Сообщение</th></tr></thead><tbody>`;
    messages.forEach(m => {
        messagesHtml += `<tr><td>${escapeHtml(m.date)}</td><td>${escapeHtml(m.name)}</td><td>${escapeHtml(m.email)}</td><td>${escapeHtml(m.phone || '-')}</td><td style="max-width:300px;">${escapeHtml(m.message)}</td></tr>`;
    });
    messagesHtml += `</tbody></table></div>`;
    
    document.getElementById('adminContent').innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span>${escapeHtml(currentUser.name)} (${escapeHtml(currentUser.email)}) <span class="badge-admin">Администратор</span></span>
            <button onclick="logout()" style="background:#D56989;color:white;border:none;padding:6px 15px;">Выйти</button>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number">${stats.totalProducts}</div><div>Товаров</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalOrders}</div><div>Заказов</div></div>
            <div class="stat-card"><div class="stat-number">${stats.newOrders}</div><div>Новых</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalRevenue} ₽</div><div>Выручка</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalUsers}</div><div>Пользователей</div></div>
            <div class="stat-card"><div class="stat-number">${stats.totalAdmins}</div><div>Админов</div></div>
        </div>
        ${productsHtml}${usersHtml}${ordersHtml}${messagesHtml}
    `;
    document.getElementById('loading').style.display = 'none';
}

window.doLogin = async function() {
    document.getElementById('loading').style.display = 'flex';
    const email = document.getElementById('loginEmail')?.value;
    const password = document.getElementById('loginPassword')?.value;
    if (await login(email, password)) renderAdminPanel();
    else { alert('Неверный email или пароль!'); document.getElementById('loading').style.display = 'none'; }
};

renderAdminPanel();
</script>
</body>
</html>
