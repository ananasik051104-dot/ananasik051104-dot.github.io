<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #D56989;
            font-family: 'Poiret One', cursive;
            padding: 32px 25px;
            color: #D56989;
            font-size: 20px;
        }
        .cart-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            background: #F3EEF1;
            border-radius: 32px;
            padding: 32px;
        }
        .cart-main-title {
            font-size: 32px;
            font-weight: 700;
            color: #C2DC80;
            margin-bottom: 28px;
            border-left: 5px solid #C2DC80;
            padding-left: 18px;
        }
        .header-area {
            background: linear-gradient(rgba(153,86,113,0.5), rgba(153,86,113,0.5)), 
                        url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');
            background-size: cover;
            border-radius: 28px;
            margin-bottom: 1.5rem;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .nav-link {
            font-family: 'Poiret One', cursive;
            font-size: 1rem;
            letter-spacing: 1.5px;
            color: #C2DC80;
            text-decoration: none;
            padding: 0.3rem 0.8rem;
            text-transform: uppercase;
        }
        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .cart-table th, .cart-table td {
            padding: 12px 8px;
            border-bottom: 1px solid #C2DC80;
            text-align: left;
        }
        .cart-product-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
        }
        .quantity-btn {
            background: #C2DC80;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #D56989;
        }
        .remove-btn {
            background: none;
            border: none;
            color: #d56989;
            font-size: 20px;
            cursor: pointer;
        }
        .cart-summary {
            text-align: right;
            padding: 20px;
            background: #C2DC80;
            border-radius: 20px;
            margin: 20px 0;
        }
        .total-price {
            font-size: 24px;
            font-weight: bold;
            color: #D56989;
        }
        .empty-cart {
            text-align: center;
            padding: 60px;
            color: #D56989;
        }
        .continue-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 24px;
            background: #D56989;
            color: #C2DC80;
            text-decoration: none;
            border-radius: 40px;
        }
        .submit-order-btn {
            background: #C2DC80;
            border: none;
            color: #D56989;
            font-size: 20px;
            font-weight: 600;
            padding: 14px 36px;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .submit-order-btn:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field-group label {
            color: #D56989;
            font-weight: 500;
        }
        .field-group input {
            padding: 12px;
            border: 1px solid #C2DC80;
            border-radius: 20px;
            font-family: inherit;
            background: #F3EEF1;
            color: #D56989;
        }
        .field-group input::placeholder {
            color: #D56989;
            opacity: 0.6;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #C2DC80;
            color: #D56989;
            padding: 12px 24px;
            border-radius: 50px;
            font-family: system-ui, sans-serif;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 700px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="cart-wrapper">
    <div class="header-area">
        <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
        <a href="index2.html" class="nav-link">КАТАЛОГ</a>
        <a href="index5.html" class="nav-link">КОНТАКТЫ</a>
        <a href="index3.html" class="nav-link">КОРЗИНА</a>
        <a href="index4.html" class="nav-link">КАБИНЕТ</a>
    </div>

    <h1 class="cart-main-title">Корзина</h1>

    <div id="cartContent"></div>

    <div id="orderSection" style="display: none;">
        <div class="form-grid">
            <div class="field-group"><label>Ваше имя *</label><input type="text" id="userName" placeholder="Ваше имя"></div>
            <div class="field-group"><label>Имя получателя</label><input type="text" id="recipientName" placeholder="Имя получателя"></div>
            <div class="field-group"><label>Ваш номер телефона *</label><input type="tel" id="userPhone" placeholder="+7 (___) ___-__-__"></div>
            <div class="field-group"><label>Номер телефона получателя</label><input type="tel" id="recipientPhone" placeholder="+7 (___) ___-__-__"></div>
            <div class="field-group"><label>Адрес доставки *</label><input type="text" id="address" placeholder="Улица, дом, квартира"></div>
            <div class="field-group"><label>Время доставки</label><input type="text" id="deliveryTime" placeholder="14:00"></div>
            <div class="field-group"><label>Дата доставки</label><input type="text" id="deliveryDate" placeholder="27.05.2025"></div>
            <div class="field-group"><label>Комментарий</label><input type="text" id="comment" placeholder="Пожелания к заказу"></div>
        </div>
        <div style="margin: 20px 0; padding: 18px; background:#C2DC80; border-radius:24px; color:#D56989;">
            <p>🌸 В нашем онлайн-магазине доставку цветов можно оплатить только на месте получения, удобным для вас способом.</p>
        </div>
        <button class="submit-order-btn" id="submitOrderBtn">🌿 Оформить заказ</button>
    </div>
</div>

<script>
    // ===== РАБОТА С КОРЗИНОЙ =====
    function getCart() {
        const cart = localStorage.getItem('estetica_cart');
        return cart ? JSON.parse(cart) : [];
    }

    function saveCart(cart) {
        localStorage.setItem('estetica_cart', JSON.stringify(cart));
    }

    function updateQuantity(productId, delta) {
        let cart = getCart();
        const index = cart.findIndex(item => item.id === productId);
        if (index !== -1) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            saveCart(cart);
            renderCart();
        }
    }

    function removeItem(productId) {
        let cart = getCart();
        cart = cart.filter(item => item.id !== productId);
        saveCart(cart);
        renderCart();
    }

    function renderCart() {
        const cart = getCart();
        const container = document.getElementById('cartContent');
        const orderSection = document.getElementById('orderSection');
        
        if (cart.length === 0) {
            container.innerHTML = `<div class="empty-cart">🛒 Корзина пуста<br><a href="index2.html" class="continue-btn">🌸 В каталог</a></div>`;
            orderSection.style.display = 'none';
            return;
        }
        
        orderSection.style.display = 'block';
        let total = 0;
        let rows = '';
        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            rows += `<tr>
                <td><img src="${item.img}" class="cart-product-img"></td>
                <td>${item.name}</td>
                <td>${item.price} р</td>
                <td>
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                    <span style="margin:0 10px">${item.quantity}</span>
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                </td>
                <td>${itemTotal} р</td>
                <td><button class="remove-btn" onclick="removeItem(${item.id})">✕</button></td>
            </tr>`;
        });
        
        container.innerHTML = `
            <table class="cart-table">
                <thead>
                    <tr><th>Товар</th><th>Название</th><th>Цена</th><th>Кол-во</th><th>Сумма</th><th></th></tr>
                </thead>
                <tbody>
                    ${rows}
                </tbody>
            </table>
            <div class="cart-summary">💐 Итого: <span class="total-price">${total} р</span></div>
        `;
    }
    
    // ===== РАБОТА С ПОЛЬЗОВАТЕЛЯМИ И ЗАКАЗАМИ =====
    
    function getCurrentUser() {
        return JSON.parse(localStorage.getItem('estetica_current_user') || 'null');
    }
    
    function getUsers() {
        return JSON.parse(localStorage.getItem('estetica_users') || '[]');
    }
    
    function saveUsers(users) {
        localStorage.setItem('estetica_users', JSON.stringify(users));
    }
    
    // Сохранение заказа в аккаунт пользователя
    function saveOrderToAccount(orderData) {
        const currentUser = getCurrentUser();
        
        if (!currentUser) {
            // Если пользователь не авторизован — сохраняем в гостевые заказы
            let guestOrders = JSON.parse(localStorage.getItem('estetica_guest_orders') || '[]');
            guestOrders.unshift(orderData);
            localStorage.setItem('estetica_guest_orders', JSON.stringify(guestOrders));
            return false;
        }
        
        // Сохраняем в аккаунт пользователя
        let users = getUsers();
        const index = users.findIndex(u => u.id === currentUser.id);
        if (index !== -1) {
            users[index].orders = users[index].orders || [];
            users[index].orders.unshift(orderData);
            saveUsers(users);
            localStorage.setItem('estetica_current_user', JSON.stringify(users[index]));
            return true;
        }
        return false;
    }
    
    // Показать уведомление
    function showToast(message) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Оформление заказа
    async function submitOrder() {
        const cart = getCart();
        if (cart.length === 0) {
            alert('🛒 Корзина пуста!');
            return;
        }
        
        // Получаем данные из формы
        const userName = document.getElementById('userName')?.value.trim();
        const userPhone = document.getElementById('userPhone')?.value.trim();
        const address = document.getElementById('address')?.value.trim();
        const recipientName = document.getElementById('recipientName')?.value.trim() || 'Не указан';
        const recipientPhone = document.getElementById('recipientPhone')?.value.trim() || 'Не указан';
        const deliveryTime = document.getElementById('deliveryTime')?.value.trim() || 'Не указано';
        const deliveryDate = document.getElementById('deliveryDate')?.value.trim() || 'Не указана';
        const comment = document.getElementById('comment')?.value.trim() || 'Без комментария';
        
        // Проверяем обязательные поля
        if (!userName) {
            alert('❌ Пожалуйста, укажите ваше имя');
            return;
        }
        if (!userPhone) {
            alert('❌ Пожалуйста, укажите ваш номер телефона');
            return;
        }
        if (!address) {
            alert('❌ Пожалуйста, укажите адрес доставки');
            return;
        }
        
        // Считаем итоговую сумму
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        // Формируем объект заказа
        const newOrder = {
            id: Date.now(),
            date: new Date().toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }),
            items: cart.map(item => ({
                id: item.id,
                name: item.name,
                quantity: item.quantity,
                price: item.price,
                img: item.img
            })),
            total: total,
            status: '🟢 Новый',
            customerName: userName,
            customerPhone: userPhone,
            recipientName: recipientName,
            recipientPhone: recipientPhone,
            address: address,
            deliveryTime: deliveryTime,
            deliveryDate: deliveryDate,
            comment: comment
        };
        
        // Сохраняем заказ в аккаунт или гостевые заказы
        const savedToAccount = saveOrderToAccount(newOrder);
        
        // Очищаем корзину
        localStorage.removeItem('estetica_cart');
        renderCart();
        
        // Очищаем форму
        const formInputs = document.querySelectorAll('#orderSection input');
        formInputs.forEach(input => {
            if (input.id !== 'deliveryTime' && input.id !== 'deliveryDate') {
                input.value = '';
            }
        });
        
        // Показываем сообщение об успехе
        if (savedToAccount) {
            alert(`🌿 ЗАКАЗ ОФОРМЛЕН!\n\n━━━━━━━━━━━━━━━━━━━━━━\n👤 Покупатель: ${userName}\n📞 Телефон: ${userPhone}\n🚚 Адрес: ${address}\n⏰ Доставка: ${deliveryTime} ${deliveryDate}\n━━━━━━━━━━━━━━━━━━━━━━\n💐 Сумма заказа: ${total} р\n━━━━━━━━━━━━━━━━━━━━━━\n\n✅ Заказ сохранён в вашем личном кабинете!\nСкоро с вами свяжутся для подтверждения.`);
            showToast(`✅ Заказ на ${total} р сохранён в личном кабинете!`);
        } else {
            alert(`🌿 ЗАКАЗ ОФОРМЛЕН!\n\n━━━━━━━━━━━━━━━━━━━━━━\n👤 Покупатель: ${userName}\n📞 Телефон: ${userPhone}\n🚚 Адрес: ${address}\n━━━━━━━━━━━━━━━━━━━━━━\n💐 Сумма заказа: ${total} р\n━━━━━━━━━━━━━━━━━━━━━━\n\n📦 Заказ сохранён.\n💡 Совет: зарегистрируйтесь в личном кабинете, чтобы видеть историю заказов!`);
            showToast(`✅ Заказ на ${total} р оформлен! Зарегистрируйтесь, чтобы видеть историю.`);
        }
    }
    
    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
        renderCart();
        const submitBtn = document.getElementById('submitOrderBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', submitOrder);
        }
    });
</script>
</body>
</html>
