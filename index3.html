<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Корзина | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poiret One',cursive;background:#D56989;padding:15px}
        .frame{max-width:1400px;width:100%;margin:0 auto;background:#F3EEF1;padding:25px;box-shadow:0 20px 35px rgba(0,0,0,0.5)}
        
        /* ШАПКА */
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;margin-bottom:25px;padding:15px 20px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;position:relative}
        .header::before,.bottom-block::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(153,86,113,0.5)}
        .logo,.nav,.bottom-block>*{position:relative;z-index:1}
        .logo{font-size:28px;font-weight:600;color:#C2DC80;text-decoration:none;text-shadow:0 2px 6px rgba(0,0,0,0.5)}
        .nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .nav a{color:#C2DC80;text-decoration:none;font-size:14px;padding:6px 10px}
        
        .line{height:2px;background:#C2DC80;margin:20px 0;opacity:.5}
        .cart-title{font-size:32px;color:#D56989;margin-bottom:25px;text-align:center;letter-spacing:2px}
        
        /* ТАБЛИЦА КОРЗИНЫ НА ВСЮ ШИРИНУ */
        .cart-container{overflow-x:auto;margin:15px 0}
        .cart-table{width:100%;min-width:650px;border-collapse:collapse;background:#F3EEF1}
        .cart-table th,.cart-table td{padding:15px 10px;text-align:center;border-bottom:1px solid #C2DC80;vertical-align:middle}
        .cart-table th{background:#C2DC80;color:#D56989;font-size:16px;font-weight:600;letter-spacing:1px}
        .cart-table td{font-size:14px;color:#5b3b45}
        
        .cart-product-img{width:60px;height:60px;object-fit:cover;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
        .product-name{font-weight:600;color:#D56989;font-size:16px}
        
        .quantity-btn{background:#D56989;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;color:#F3EEF1;transition:.2s;margin:0 5px}
        .quantity-btn:hover{background:#b84d6e;transform:scale(1.05)}
        .quantity-num{font-size:16px;font-weight:600;margin:0 8px;display:inline-block;min-width:24px}
        
        .remove-btn{background:none;border:none;color:#D56989;font-size:22px;cursor:pointer;transition:.2s}
        .remove-btn:hover{color:#b84d6e;transform:scale(1.1)}
        
        .cart-summary{text-align:right;padding:20px;background:#C2DC80;margin:20px 0;border-radius:12px}
        .cart-summary .total-label{font-size:18px;color:#D56989;margin-right:15px}
        .cart-summary .total-price{font-size:32px;font-weight:bold;color:#D56989}
        
        .empty-cart{text-align:center;padding:60px 20px;color:#D56989;font-size:22px}
        .empty-cart .continue-btn{display:inline-block;margin-top:20px;padding:12px 30px;background:#D56989;color:#F3EEF1;text-decoration:none;border-radius:40px;font-size:16px;transition:.2s}
        .empty-cart .continue-btn:hover{background:#b84d6e}
        
        /* ФОРМА ОФОРМЛЕНИЯ */
        .form-section{margin-top:30px;padding:25px;background:#F3EEF1;border:2px solid #C2DC80;border-radius:16px}
        .form-title{font-size:26px;color:#D56989;margin-bottom:20px;text-align:center;font-weight:600}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;margin-bottom:20px}
        .field-group{display:flex;flex-direction:column;gap:6px}
        .field-group label{font-size:14px;font-weight:600;color:#D56989}
        .field-group input{padding:12px;border:1px solid #C2DC80;border-radius:8px;background:#F3EEF1;font-family:inherit;font-size:14px;color:#D56989;transition:.2s}
        .field-group input:focus{outline:none;border-color:#D56989;box-shadow:0 0 0 2px rgba(213,105,137,0.2)}
        
        .info-text{background:#C2DC80;padding:15px;margin:20px 0;text-align:center;color:#D56989;font-size:14px;border-radius:8px}
        .submit-order-btn{background:#D56989;border:none;color:#F3EEF1;font-size:18px;padding:14px 35px;cursor:pointer;display:block;margin:20px auto 0;border-radius:40px;transition:.2s;font-family:inherit}
        .submit-order-btn:hover{background:#b84d6e;transform:scale(1.02)}
        
        /* ПОДВАЛ */
        .bottom-block{background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin-top:40px;padding:25px 15px 20px;position:relative;border-radius:12px}
        .footer-info{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;color:#C2DC80;margin:10px 0 20px;font-size:13px;text-align:center}
        .social-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:15px}
        .social-link{color:#C2DC80;text-decoration:none;font-size:14px;padding:6px 12px;transition:.2s}
        .social-link:hover{background:rgba(193,130,146,0.35);border-radius:20px}
        .copyright{text-align:center;font-size:11px;color:#C2DC80}
        
        .toast{position:fixed;bottom:20px;right:20px;left:20px;background:#1f5437;color:white;padding:12px;text-align:center;font-family:system-ui;font-size:13px;z-index:1001;animation:slideIn .3s ease;border-radius:30px;max-width:400px;margin:0 auto}
        @keyframes slideIn{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        
        @media (max-width:768px){
            .frame{padding:15px}
            .header{flex-direction:column;text-align:center}
            .cart-table th,.cart-table td{padding:10px 5px;font-size:12px}
            .cart-product-img{width:45px;height:45px}
            .product-name{font-size:13px}
            .quantity-btn{width:28px;height:28px;font-size:16px}
            .cart-summary .total-price{font-size:24px}
            .form-title{font-size:22px}
            .footer-info{flex-direction:column;gap:8px}
        }
        
        @media (max-width:480px){
            .cart-table{min-width:550px}
            .cart-table th,.cart-table td{padding:8px 4px;font-size:11px}
        }
    </style>
</head>
<body>
<div class="frame">
    <div class="header">
        <a href="index.html" class="logo">Estética</a>
        <div class="nav">
            <a href="index.html">ГЛАВНАЯ</a>
            <a href="index2.html">КАТАЛОГ</a>
            <a href="index5.html">КОНТАКТЫ</a>
            <a href="index3.html">КОРЗИНА</a>
            <a href="index4.html">КАБИНЕТ</a>
        </div>
    </div>
    
    <div class="line"></div>
    <h1 class="cart-title">🛒 Корзина</h1>
    
    <div id="cartContent"></div>
    <div id="orderSection" style="display:none;">
        <div class="form-section">
            <div class="form-title">Информация о заказе</div>
            <div class="form-grid">
                <div class="field-group"><label>Ваше имя *</label><input type="text" id="userName" placeholder="Иван Иванов"></div>
                <div class="field-group"><label>Имя получателя</label><input type="text" id="recipientName" placeholder="Имя получателя"></div>
                <div class="field-group"><label>Ваш телефон *</label><input type="tel" id="userPhone" placeholder="+7 (___) ___-__-__"></div>
                <div class="field-group"><label>Телефон получателя</label><input type="tel" id="recipientPhone" placeholder="+7 (___) ___-__-__"></div>
                <div class="field-group"><label>Адрес доставки *</label><input type="text" id="address" placeholder="Улица, дом, квартира"></div>
                <div class="field-group"><label>Время доставки</label><input type="text" id="deliveryTime" placeholder="14:00"></div>
                <div class="field-group"><label>Дата доставки</label><input type="text" id="deliveryDate" placeholder="27.05.2026"></div>
                <div class="field-group"><label>Комментарий</label><input type="text" id="comment" placeholder="Пожелания к букету"></div>
            </div>
            <div class="info-text">💐 Оплата только на месте получения наличными или картой</div>
            <button class="submit-order-btn" id="submitOrderBtn">✅ Оформить заказ</button>
        </div>
    </div>
    
    <div class="bottom-block">
        <div class="footer-info">
            <span>🌸 Цветы, которых нет у других</span>
            <span>✨ Эксклюзив в каждом стебле</span>
            <span>💝 Скажут больше, чем слова</span>
        </div>
        <div class="social-links">
            <a href="https://vk.com" target="_blank" class="social-link">ВКонтакте</a>
            <a href="https://instagram.com" target="_blank" class="social-link">Instagram</a>
            <a href="https://wa.me/79381112274" target="_blank" class="social-link">WhatsApp</a>
        </div>
        <div class="copyright">2026 Estética Цветочная мастерская</div>
    </div>
</div>

<script>
const BIN_ID = '6a0e46146877513b27a708ce';
const MASTER_KEY = '$2a$10$HCH9Xf3UP6Dl1.e9yCDKeO2t9wmeo7tBLhtrewQUQb6YW2q5uQ.ju';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

async function getData() {
    const res = await fetch(API_URL, { headers: { 'X-Master-Key': MASTER_KEY } });
    const data = await res.json();
    return data.record || { users: [], orders: [], messages: [], products: [] };
}
async function saveData(data) {
    await fetch(API_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify(data) });
}

function getCart() { return JSON.parse(localStorage.getItem('estetica_cart') || '[]'); }
function saveCart(c) { localStorage.setItem('estetica_cart', JSON.stringify(c)); updateCartCount(); renderCart(); }
function updateCartCount() { 
    let total = getCart().reduce((s,i)=>s+i.quantity,0); 
    let link = document.querySelector('.nav a[href="index3.html"]'); 
    if(link) link.innerHTML = total > 0 ? `КОРЗИНА (${total})` : `КОРЗИНА`; 
}
function showToast(m) { 
    let t = document.querySelector('.toast'); if(t) t.remove(); 
    t = document.createElement('div'); t.className = 'toast'; t.textContent = m; 
    document.body.appendChild(t); setTimeout(()=>t.remove(),3000); 
}

function updateQuantity(id, delta) {
    let cart = getCart(); 
    let idx = cart.findIndex(i => i.id === id);
    if (idx !== -1) { 
        cart[idx].quantity += delta; 
        if (cart[idx].quantity <= 0) cart.splice(idx, 1); 
        saveCart(cart); 
    }
}
function removeItem(id) { 
    let cart = getCart(); 
    cart = cart.filter(i => i.id !== id); 
    saveCart(cart); 
}

function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cartContent');
    const orderSec = document.getElementById('orderSection');
    
    if (cart.length === 0) {
        container.innerHTML = `<div class="empty-cart">🛍️ Корзина пуста<br><a href="index2.html" class="continue-btn">🌸 В каталог</a></div>`;
        orderSec.style.display = 'none';
        return;
    }
    orderSec.style.display = 'block';
    
    let total = 0;
    let rows = '';
    for (let item of cart) {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        rows += `
            <tr>
                <td><img src="${item.img}" class="cart-product-img" alt="${item.name}"></td>
                <td class="product-name">${item.name}</td>
                <td>${item.price} ₽</td>
                <td>
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                    <span class="quantity-num">${item.quantity}</span>
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                </td>
                <td><strong>${itemTotal} ₽</strong></td>
                <td><button class="remove-btn" onclick="removeItem(${item.id})">✕</button></td>
            </tr>
        `;
    }
    
    container.innerHTML = `
        <div class="cart-container">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Товар</th>
                        <th>Название</th>
                        <th>Цена</th>
                        <th>Количество</th>
                        <th>Сумма</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
        <div class="cart-summary">
            <span class="total-label">Итого:</span>
            <span class="total-price">${total} ₽</span>
        </div>
    `;
}

async function saveOrderToJSONBin(orderData) {
    const data = await getData();
    data.orders = data.orders || [];
    data.orders.unshift(orderData);
    await saveData(data);
    return true;
}

async function submitOrder() {
    const cart = getCart();
    if (cart.length === 0) return alert('Корзина пуста');
    
    const name = document.getElementById('userName')?.value.trim();
    const phone = document.getElementById('userPhone')?.value.trim();
    const address = document.getElementById('address')?.value.trim();
    
    if (!name || !phone || !address) {
        alert('Пожалуйста, заполните имя, телефон и адрес доставки!');
        return;
    }
    
    const total = cart.reduce((s,i)=>s + i.price * i.quantity, 0);
    const orderData = {
        id: Date.now(),
        date: new Date().toLocaleString('ru-RU'),
        userEmail: 'Гость',
        userName: name,
        userPhone: phone,
        items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity, img: i.img })),
        total: total,
        status: 'Новый',
        address: address,
        recipientName: document.getElementById('recipientName')?.value || '',
        recipientPhone: document.getElementById('recipientPhone')?.value || '',
        deliveryTime: document.getElementById('deliveryTime')?.value || '',
        deliveryDate: document.getElementById('deliveryDate')?.value || '',
        comment: document.getElementById('comment')?.value || ''
    };
    
    const result = await saveOrderToJSONBin(orderData);
    if (result) {
        localStorage.removeItem('estetica_cart');
        renderCart();
        updateCartCount();
        // Очистка формы
        document.querySelectorAll('#orderSection input').forEach(i => i.value = '');
        alert(`✅ Заказ оформлен!\n━━━━━━━━━━━━━━━━\n📦 Сумма: ${total} ₽\n🚚 Доставка: ${address}\n━━━━━━━━━━━━━━━━\nСкоро с вами свяжутся!`);
        showToast(`Заказ на ${total} ₽ успешно оформлен!`);
    } else {
        alert('❌ Ошибка оформления заказа. Попробуйте позже.');
    }
}

document.addEventListener('DOMContentLoaded', () => { 
    renderCart(); 
    document.getElementById('submitOrderBtn')?.addEventListener('click', submitOrder);
});
</script>
</body>
</html>
