<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Корзина | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poiret One',cursive;background:#D56989;padding:15px}
        .frame{
            max-width:1400px;
            width:100%;
            margin:0 auto;
            background:#F3EEF1;
            padding:25px;
            box-shadow:0 20px 35px rgba(0,0,0,0.5);
        }
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;margin-bottom:25px;padding:15px 20px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;position:relative}
        .header::before,.bottom-block::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(153,86,113,0.5)}
        .logo,.nav,.bottom-block>*{position:relative;z-index:1}
        .logo{font-size:28px;font-weight:600;color:#C2DC80;text-decoration:none;text-shadow:0 2px 6px rgba(0,0,0,0.5)}
        .nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .nav a{color:#C2DC80;text-decoration:none;font-size:14px;padding:6px 10px}
        .line{height:2px;background:#C2DC80;margin:20px 0;opacity:.5}
        .cart-title{font-size:32px;color:#D56989;margin-bottom:25px;text-align:center;font-weight:600}
        
        /* ТАБЛИЦА КОРЗИНЫ НА ВСЮ ШИРИНУ */
        .table-wrapper{
            overflow-x:auto;
            margin:20px 0;
            border:1px solid #C2DC80;
        }
        .cart-table{
            width:100%;
            border-collapse:collapse;
            font-size:15px;
            min-width:650px;
        }
        .cart-table th{
            background:#C2DC80;
            color:#D56989;
            padding:15px 12px;
            text-align:left;
            font-weight:600;
            font-size:16px;
        }
        .cart-table td{
            padding:15px 12px;
            border-bottom:1px solid #C2DC80;
            vertical-align:middle;
        }
        .cart-product-img{
            width:70px;
            height:70px;
            object-fit:cover;
            border:1px solid #D56989;
        }
        .product-name{
            font-weight:600;
            color:#D56989;
            font-size:16px;
        }
        .product-price{
            color:#D56989;
            font-weight:500;
        }
        .quantity-control{
            display:flex;
            align-items:center;
            gap:12px;
        }
        .quantity-btn{
            background:#D56989;
            border:none;
            width:32px;
            height:32px;
            cursor:pointer;
            font-size:18px;
            color:#F3EEF1;
            border-radius:4px;
            transition:0.2s;
        }
        .quantity-btn:hover{
            background:#b84d6e;
            transform:scale(1.05);
        }
        .quantity-value{
            font-size:16px;
            font-weight:600;
            color:#D56989;
            min-width:30px;
            text-align:center;
        }
        .remove-btn{
            background:none;
            border:none;
            color:#D56989;
            font-size:24px;
            cursor:pointer;
            transition:0.2s;
        }
        .remove-btn:hover{
            color:#b84d6e;
            transform:scale(1.1);
        }
        .discount-badge{
            display:inline-block;
            background:#1f5437;
            color:white;
            font-size:11px;
            padding:2px 8px;
            margin-top:5px;
            border-radius:20px;
        }
        .cart-summary{
            text-align:right;
            padding:20px 25px;
            background:#C2DC80;
            margin:20px 0;
            font-size:24px;
            font-weight:bold;
            color:#D56989;
        }
        .cart-summary small{
            font-size:13px;
            font-weight:normal;
            display:block;
            margin-top:8px;
            color:#5b3b45;
        }
        .empty-cart{
            text-align:center;
            padding:60px;
            color:#D56989;
            font-size:24px;
        }
        .continue-btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 30px;
            background:#D56989;
            color:#F3EEF1;
            text-decoration:none;
            font-size:16px;
            transition:0.2s;
        }
        .continue-btn:hover{
            background:#b84d6e;
        }
        .form-section{
            margin-top:30px;
            padding:25px;
            background:#F3EEF1;
            border:1px solid #C2DC80;
        }
        .form-title{
            font-size:26px;
            color:#D56989;
            margin-bottom:20px;
            text-align:center;
            font-weight:600;
        }
        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:18px;
            margin-bottom:25px;
        }
        .field-group{
            display:flex;
            flex-direction:column;
            gap:6px;
        }
        .field-group label{
            font-size:14px;
            font-weight:600;
            color:#D56989;
        }
        .field-group input{
            padding:12px 15px;
            border:1px solid #C2DC80;
            background:#F3EEF1;
            font-family:inherit;
            font-size:15px;
            color:#D56989;
            transition:0.2s;
        }
        .field-group input:focus{
            outline:none;
            border-color:#D56989;
        }
        .info-text{
            background:#C2DC80;
            padding:15px;
            margin:20px 0;
            text-align:center;
            color:#D56989;
            font-size:14px;
        }
        .submit-order-btn{
            background:#D56989;
            border:none;
            color:#F3EEF1;
            font-size:18px;
            font-weight:600;
            padding:14px 40px;
            cursor:pointer;
            display:block;
            margin:20px auto 0;
            transition:0.2s;
        }
        .submit-order-btn:hover{
            background:#b84d6e;
            transform:scale(1.02);
        }
        .bottom-block{
            background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');
            background-size:cover;
            margin-top:30px;
            padding:20px 15px 15px;
            position:relative;
        }
        .footer-info{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            color:#C2DC80;
            margin:10px 0 15px;
            font-size:13px;
            text-align:center;
        }
        .social-links{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin-bottom:12px;
        }
        .social-link{
            color:#C2DC80;
            text-decoration:none;
            font-size:14px;
            padding:5px 12px;
            transition:0.2s;
        }
        .social-link:hover{
            background:rgba(193,130,146,0.35);
        }
        .copyright{
            text-align:center;
            font-size:11px;
            color:#C2DC80;
        }
        .toast{
            position:fixed;
            bottom:20px;
            right:20px;
            left:20px;
            background:#1f5437;
            color:white;
            padding:12px;
            text-align:center;
            font-family:system-ui;
            font-size:13px;
            z-index:1001;
            animation:slideIn .3s ease;
            border-radius:30px;
        }
        @keyframes slideIn{
            from{transform:translateY(100%);opacity:0}
            to{transform:translateX(0);opacity:1}
        }
        @media (max-width:700px){
            .frame{padding:15px}
            .header{flex-direction:column;text-align:center}
            .cart-title{font-size:26px}
            .cart-table th,.cart-table td{padding:10px 8px;font-size:13px}
            .cart-product-img{width:50px;height:50px}
            .quantity-btn{width:28px;height:28px;font-size:16px}
            .cart-summary{font-size:20px}
            .form-grid{grid-template-columns:1fr}
            .footer-info{flex-direction:column;gap:10px}
        }
        @media (min-width:701px) and (max-width:1024px){
            .form-grid{grid-template-columns:1fr 1fr}
        }
    </style>
</head>
<body>
<div class="frame">
    <div class="header"><a href="index.html" class="logo">Estética</a><div class="nav"><a href="index.html">ГЛАВНАЯ</a><a href="index2.html">КАТАЛОГ</a><a href="index5.html">КОНТАКТЫ</a><a href="index3.html">КОРЗИНА</a><a href="index4.html">КАБИНЕТ</a></div></div>
    <div class="line"></div>
    <h1 class="cart-title">Корзина</h1>
    <div id="cartContent"></div>
    <div id="orderSection" style="display:none;">
        <div class="form-section">
            <div class="form-title">Информация о заказе</div>
            <div class="form-grid">
                <div class="field-group"><label>Ваше имя</label><input type="text" id="userName" placeholder="Ваше имя"></div>
                <div class="field-group"><label>Имя получателя</label><input type="text" id="recipientName" placeholder="Имя получателя"></div>
                <div class="field-group"><label>Ваш телефон</label><input type="tel" id="userPhone" placeholder="+7 (___) ___-__-__"></div>
                <div class="field-group"><label>Телефон получателя</label><input type="tel" id="recipientPhone" placeholder="+7 (___) ___-__-__"></div>
                <div class="field-group"><label>Адрес доставки</label><input type="text" id="address" placeholder="Улица, дом, квартира"></div>
                <div class="field-group"><label>Время доставки</label><input type="text" id="deliveryTime" placeholder="14:00"></div>
                <div class="field-group"><label>Дата доставки</label><input type="text" id="deliveryDate" placeholder="27.05.2025"></div>
                <div class="field-group"><label>Комментарий</label><input type="text" id="comment" placeholder="Пожелания к заказу"></div>
            </div>
            <div class="info-text">Оплата только на месте получения</div>
            <button class="submit-order-btn" id="submitOrderBtn">Оформить заказ</button>
        </div>
    </div>
    <div class="bottom-block">
        <div class="footer-info"><span>Цветы, которых нет у других</span><span>Эксклюзив в каждом стебле</span><span>Скажут больше, чем слова</span></div>
        <div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">ВКонтакте</a><a href="https://instagram.com" target="_blank" class="social-link">Instagram</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">WhatsApp</a></div>
        <div class="copyright">2026 Estética Цветочная мастерская</div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://nmbxiqanaeqmelxhczdu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tYnhpcWFuYWVxbWVseGhjemR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDM2MDYsImV4cCI6MjA5NTM3OTYwNn0.Tthpbmnys_e4B13bZ1mt0t4t4QRYwzxDqu_83vuSks8';

let activePromo = { category_id: null, percent: 0, name: null };
let productsFromDB = [];

async function loadProducts() {
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        productsFromDB = await res.json();
    } catch(e) { console.error(e); }
}

async function getActivePromoFromDB() {
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/promotions?is_active=eq.true&select=*`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const promotions = await res.json();
        if (promotions && promotions.length > 0) {
            const active = promotions[0];
            activePromo = { category_id: active.category_id, percent: active.discount_percent, name: active.name };
        } else {
            activePromo = { category_id: null, percent: 0, name: null };
        }
    } catch(e) { console.error(e); }
}

function getCart() { return JSON.parse(localStorage.getItem('estetica_cart') || '[]'); }
function saveCart(c) { localStorage.setItem('estetica_cart', JSON.stringify(c)); updateCartCount(); renderCart(); }
function updateCartCount() { let t = getCart().reduce((s,i)=>s+i.quantity,0); let l = document.querySelector('.nav a[href="index3.html"]'); if(l) l.innerHTML = t > 0 ? `КОРЗИНА (${t})` : `КОРЗИНА`; }
function showToast(m) { let t = document.querySelector('.toast'); if(t) t.remove(); t = document.createElement('div'); t.className = 'toast'; t.textContent = m; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }

function updateQuantity(id, delta) {
    let cart = getCart(); let idx = cart.findIndex(i => i.id === id);
    if (idx !== -1) { cart[idx].quantity += delta; if (cart[idx].quantity <= 0) cart.splice(idx, 1); saveCart(cart); }
}
function removeItem(id) { let cart = getCart(); cart = cart.filter(i => i.id !== id); saveCart(cart); }

async function renderCart() {
    if (productsFromDB.length === 0) await loadProducts();
    await getActivePromoFromDB();
    
    const cart = getCart();
    const container = document.getElementById('cartContent');
    const orderSec = document.getElementById('orderSection');
    
    if (cart.length === 0) {
        container.innerHTML = `<div class="empty-cart">Корзина пуста<br><a href="index2.html" class="continue-btn">В каталог</a></div>`;
        orderSec.style.display = 'none';
        return;
    }
    
    orderSec.style.display = 'block';
    let total = 0;
    let rows = '';
    
    for (let item of cart) {
        const productInfo = productsFromDB.find(p => p.id == item.id);
        const itemCategoryId = productInfo ? productInfo.category_id : null;
        
        let originalPrice = item.price * item.quantity;
        let discountAmount = 0;
        let discountedPrice = originalPrice;
        let showDiscount = false;
        
        if (activePromo.category_id && activePromo.category_id === itemCategoryId) {
            discountAmount = originalPrice * (activePromo.percent / 100);
            discountedPrice = originalPrice - discountAmount;
            showDiscount = true;
        }
        
        total += discountedPrice;
        
        rows += `<tr>
            <td><img src="${item.img}" class="cart-product-img" loading="lazy"></td>
            <td>
                <div class="product-name">${item.name}</div>
                ${showDiscount ? `<span class="discount-badge">Скидка ${activePromo.percent}%</span>` : ''}
            </td>
            <td><div class="product-price">${Math.round(originalPrice)} ₽</div></td>
            <td>
                <div class="quantity-control">
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                    <span class="quantity-value">${item.quantity}</span>
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                </div>
            </td>
            <td>
                <div class="product-price">
                    ${showDiscount ? `<s style="color:#999; font-size:12px;">${Math.round(originalPrice)} ₽</s><br><span style="color:#1f5437; font-weight:bold;">${Math.round(discountedPrice)} ₽</span>` : `${Math.round(originalPrice)} ₽`}
                </div>
            </td>
            <td><button class="remove-btn" onclick="removeItem(${item.id})">✕</button></td>
        </tr>`;
    }
    
    let promoMessage = '';
    if (activePromo.category_id && activePromo.percent > 0) {
        promoMessage = `<small>Применена акция: скидка ${activePromo.percent}%</small>`;
    }
    
    container.innerHTML = `
        <div class="table-wrapper">
            <table class="cart-table">
                <thead>
                    <tr><th>Товар</th><th>Название</th><th>Цена</th><th>Кол-во</th><th>Сумма</th><th></th></tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
        <div class="cart-summary">Итого: ${Math.round(total)} ₽${promoMessage}</div>
    `;
}

async function saveOrderToSupabase(orderData) {
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(orderData)
        });
        return await res.json();
    } catch(e) { console.error(e); return null; }
}

async function submitOrder() {
    const cart = getCart();
    if (cart.length === 0) return alert('Корзина пуста');
    
    const name = document.getElementById('userName')?.value.trim();
    const phone = document.getElementById('userPhone')?.value.trim();
    const address = document.getElementById('address')?.value.trim();
    
    if (!name || !phone || !address) return alert('Заполните имя, телефон и адрес!');
    
    await loadProducts();
    await getActivePromoFromDB();
    
    let total = 0;
    const itemsWithDiscount = [];
    
    for (let item of cart) {
        const productInfo = productsFromDB.find(p => p.id == item.id);
        const itemCategoryId = productInfo ? productInfo.category_id : null;
        
        let originalPrice = item.price * item.quantity;
        let discountAmount = 0;
        
        if (activePromo.category_id && activePromo.category_id === itemCategoryId) {
            discountAmount = originalPrice * (activePromo.percent / 100);
        }
        
        total += (originalPrice - discountAmount);
        itemsWithDiscount.push({ ...item, category_id: itemCategoryId, originalPrice, discountAmount });
    }
    
    let userId = null;
    let userEmail = 'Гость';
    const savedUser = localStorage.getItem('estetica_current_user');
    if (savedUser) {
        try {
            const user = JSON.parse(savedUser);
            userId = user.id;
            userEmail = user.email;
        } catch(e) {}
    }
    
    const orderData = {
        date: new Date().toLocaleString('ru-RU'),
        user_id: userId,
        userEmail: userEmail,
        items: itemsWithDiscount,
        total: Math.round(total),
        address: address,
        deliveryTime: document.getElementById('deliveryTime')?.value || '',
        comment: document.getElementById('comment')?.value || '',
        promo_applied: activePromo.category_id,
        promo_discount: activePromo.percent
    };
    
    const result = await saveOrderToSupabase(orderData);
    
    if (result && result.id) {
        localStorage.removeItem('estetica_cart');
        renderCart();
        updateCartCount();
        document.querySelectorAll('#orderSection input').forEach(i => i.value = '');
        alert(`Заказ оформлен!\nСумма: ${Math.round(total)} ₽\nСкоро с вами свяжутся!`);
        showToast(`Заказ на ${Math.round(total)} ₽ оформлен!`);
    } else {
        alert('Ошибка оформления заказа. Попробуйте позже.');
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    await loadProducts();
    await renderCart();
    document.getElementById('submitOrderBtn')?.addEventListener('click', submitOrder);
});
</script>
</body>
</html>
