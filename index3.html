<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poiret One',cursive;background:#D56989;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .frame{max-width:1300px;width:100%;background:#F3EEF1;padding:30px;box-shadow:0 20px 35px rgba(0,0,0,0.5)}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;margin-bottom:30px;padding:25px 30px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;position:relative}
        .header::before,.bottom-block::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(153,86,113,0.5)}
        .logo,.nav,.bottom-block>*{position:relative;z-index:1}
        .logo{font-size:36px;font-weight:600;color:#C2DC80;text-decoration:none;text-shadow:0 2px 6px rgba(0,0,0,0.5)}
        .nav{display:flex;flex-wrap:wrap;gap:20px}
        .nav a{color:#C2DC80;text-decoration:none;font-size:20px}
        .line{height:3px;background:#C2DC80;margin:30px 0;opacity:.5}
        .cart-title{font-size:38px;font-weight:700;color:#D56989;margin-bottom:30px;text-align:center}
        .cart-table{width:100%;border-collapse:collapse;margin:20px 0}
        .cart-table th,.cart-table td{padding:15px 10px;border-bottom:1px solid #C2DC80;text-align:left}
        .cart-table th{background:#C2DC80;color:#D56989}
        .cart-product-img{width:70px;height:70px;object-fit:cover}
        .quantity-btn{background:#D56989;border:none;width:30px;height:30px;cursor:pointer;font-size:18px;color:#F3EEF1}
        .remove-btn{background:none;border:none;color:#D56989;font-size:24px;cursor:pointer}
        .cart-summary{text-align:right;padding:20px;background:#C2DC80;margin:20px 0;font-size:24px;font-weight:bold;color:#D56989}
        .empty-cart{text-align:center;padding:60px;color:#D56989;font-size:24px}
        .continue-btn{display:inline-block;margin-top:20px;padding:12px 30px;background:#D56989;color:#F3EEF1;text-decoration:none;font-size:18px}
        .form-section{margin-top:30px;padding:20px;background:#F3EEF1;border:1px solid #C2DC80}
        .form-title{font-size:28px;color:#D56989;margin-bottom:20px;text-align:center}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
        .field-group{display:flex;flex-direction:column;gap:8px}
        .field-group label{font-size:16px;font-weight:600;color:#D56989}
        .field-group input{padding:12px;border:1px solid #C2DC80;background:#F3EEF1;font-family:inherit;font-size:16px;color:#D56989}
        .info-text{background:#C2DC80;padding:18px;margin:20px 0;text-align:center;color:#D56989}
        .submit-order-btn{background:#D56989;border:none;color:#F3EEF1;font-size:20px;font-weight:600;padding:14px 36px;cursor:pointer;display:block;margin:20px auto 0}
        .submit-order-btn:hover{background:#b84d6e}
        .bottom-block{background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin-top:40px;padding:30px 20px 20px;position:relative}
        .footer-info{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;color:#C2DC80;margin:15px 0 30px;font-size:18px}
        .social-links{display:flex;justify-content:center;gap:35px;flex-wrap:wrap;margin-bottom:20px}
        .social-link{color:#C2DC80;text-decoration:none;font-size:20px;padding:6px 18px}
        .social-link:hover{background:rgba(193,130,146,0.35)}
        .copyright{text-align:center;font-size:15px;color:#C2DC80}
        .toast{position:fixed;bottom:30px;right:30px;background:#1f5437;color:white;padding:12px 24px;font-family:system-ui;font-size:14px;z-index:1000;animation:slideIn .3s}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        @media(max-width:700px){.frame{padding:20px}.header{flex-direction:column;text-align:center}.logo{font-size:28px}.nav a{font-size:16px}.form-grid{grid-template-columns:1fr}.footer-info{flex-direction:column;gap:15px;text-align:center}}
    </style>
</head>
<body>
<div class="frame">
    <div class="header"><a href="index.html" class="logo">Estética</a><div class="nav"><a href="index.html">ГЛАВНАЯ</a><a href="index2.html">КАТАЛОГ</a><a href="index5.html">КОНТАКТЫ</a><a href="index3.html">КОРЗИНА</a><a href="index4.html">КАБИНЕТ</a></div></div>
    <div class="line"></div>
    <h1 class="cart-title">Корзина</h1>
    <div id="cartContent"></div>
    <div id="orderSection" style="display:none;"><div class="form-section"><div class="form-title">Информация о заказе</div><div class="form-grid">
        <div class="field-group"><label>Ваше имя *</label><input type="text" id="userName" placeholder="Ваше имя"></div>
        <div class="field-group"><label>Имя получателя</label><input type="text" id="recipientName" placeholder="Имя получателя"></div>
        <div class="field-group"><label>Ваш телефон *</label><input type="tel" id="userPhone" placeholder="+7"></div>
        <div class="field-group"><label>Телефон получателя</label><input type="tel" id="recipientPhone" placeholder="+7"></div>
        <div class="field-group"><label>Адрес доставки *</label><input type="text" id="address" placeholder="Адрес"></div>
        <div class="field-group"><label>Время доставки</label><input type="text" id="deliveryTime" placeholder="14:00"></div>
        <div class="field-group"><label>Дата доставки</label><input type="text" id="deliveryDate" placeholder="27.05.2025"></div>
        <div class="field-group"><label>Комментарий</label><input type="text" id="comment" placeholder="Пожелания"></div>
    </div><div class="info-text">🌸 Оплата только на месте получения</div><button class="submit-order-btn" id="submitOrderBtn">🌿 Оформить заказ</button></div></div>
    <div class="bottom-block"><div class="footer-info"><span>✦ Цветы, которых нет у других</span><span>✦ Эксклюзив в каждом стебле</span><span>✦ Скажут больше, чем слова</span></div><div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">📘 ВКонтакте</a><a href="https://instagram.com" target="_blank" class="social-link">📷 Instagram</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">💬 WhatsApp</a></div><div class="copyright">© 2026 Estética — Цветочная мастерская</div></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzPREh-SxEeav_K2cH2Snwer7DRkonwlT5_Jy0asTS4bU5av2o7LdlSWgLnA-TNgjUR/exec';

let currentUser = null;

async function getCurrentUser() {
    const saved = localStorage.getItem('estetica_current_user');
    if (saved) {
        currentUser = JSON.parse(saved);
        try {
            const response = await fetch(`${API_URL}?action=getUser&email=${encodeURIComponent(currentUser.email)}`);
            const result = await response.json();
            if (result.success && result.data) {
                currentUser = result.data;
                localStorage.setItem('estetica_current_user', JSON.stringify(currentUser));
            }
        } catch(e) {}
    }
    return currentUser;
}

function getCart() {
    return JSON.parse(localStorage.getItem('estetica_cart') || '[]');
}

function saveCart(cart) {
    localStorage.setItem('estetica_cart', JSON.stringify(cart));
    updateCartCount();
    renderCart();
}

function updateCartCount() {
    const cart = getCart();
    const total = cart.reduce((s,i) => s + i.quantity, 0);
    const link = document.querySelector('.nav a[href="index3.html"]');
    if (link) link.innerHTML = total > 0 ? `КОРЗИНА 🛒(${total})` : `КОРЗИНА`;
}

function showToast(m) {
    let t = document.querySelector('.toast');
    if (t) t.remove();
    t = document.createElement('div');
    t.className = 'toast';
    t.textContent = m;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function updateQuantity(id, delta) {
    let cart = getCart();
    const idx = cart.findIndex(i => i.id === id);
    if (idx !== -1) {
        cart[idx].quantity += delta;
        if (cart[idx].quantity <= 0) cart.splice(idx, 1);
        saveCart(cart);
    }
}

function removeItem(id) {
    let cart = getCart();
    cart = cart.filter(i => i.id !== id);
    saveCart(cart);
}

function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cartContent');
    const orderSec = document.getElementById('orderSection');
    
    if (cart.length === 0) {
        container.innerHTML = `<div class="empty-cart">🛒 Корзина пуста<br><a href="index2.html" class="continue-btn">🌸 В каталог</a></div>`;
        orderSec.style.display = 'none';
        return;
    }
    
    orderSec.style.display = 'block';
    let total = 0, rows = '';
    
    cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        rows += `<tr>
            <td><img src="${item.img}" class="cart-product-img"></td>
            <td>${item.name}</td>
            <td>${item.price} ₽</td><td><button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button><span style="margin:0 15px">${item.quantity}</span><button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button></td>
            <td>${itemTotal} ₽</td><td><button class="remove-btn" onclick="removeItem(${item.id})">✕</button></td>
        </tr>`;
    });
    
    container.innerHTML = `<table class="cart-table"><thead><tr><th>Товар</th><th>Название</th><th>Цена</th><th>Кол-во</th><th>Сумма</th><th></th></tr></thead><tbody>${rows}</tbody></table><div class="cart-summary">💐 Итого: ${total} ₽</div>`;
}

async function submitOrder() {
    const cart = getCart();
    if (cart.length === 0) return alert('Корзина пуста');
    
    const name = document.getElementById('userName')?.value.trim();
    const phone = document.getElementById('userPhone')?.value.trim();
    const address = document.getElementById('address')?.value.trim();
    
    if (!name || !phone || !address) return alert('Заполните имя, телефон и адрес!');
    
    await getCurrentUser();
    
    const total = cart.reduce((s,i) => s + i.price * i.quantity, 0);
    
    const orderData = {
        action: 'createOrder',
        userId: currentUser?.id || 0,
        userEmail: currentUser?.email || 'Гость',
        items: cart,
        total: total,
        address: address,
        deliveryTime: document.getElementById('deliveryTime')?.value || '',
        comment: document.getElementById('comment')?.value || ''
    };
    
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderData)
        });
        const result = await response.json();
        
        if (result.success) {
            localStorage.removeItem('estetica_cart');
            renderCart();
            updateCartCount();
            document.querySelectorAll('#orderSection input').forEach(i => i.value = '');
            alert(`🌿 Заказ оформлен!\nСумма: ${total} ₽\nСкоро с вами свяжутся!`);
            showToast(`Заказ на ${total} ₽ оформлен!`);
        } else {
            alert('❌ Ошибка оформления заказа');
        }
    } catch(e) {
        alert('❌ Ошибка соединения');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    renderCart();
    document.getElementById('submitOrderBtn')?.addEventListener('click', submitOrder);
});
</script>
</body>
</html>
