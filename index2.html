<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estética | Цветочный каталог</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #D56989;
            font-family: 'Poiret One', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            min-height: 100vh;
        }
        .page {
            max-width: 1300px;
            width: 100%;
            background: #F3EEF1;
            padding: 1.8rem 2rem 2.5rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            position: relative;
        }
        .header-area {
            background: linear-gradient(rgba(153,86,113,0.5), rgba(153,86,113,0.5)), 
                        url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');
            background-size: cover;
            background-position: center 20%;
            border-radius: 28px;
            margin-bottom: 1.5rem;
            padding: 1.2rem 1.5rem;
            min-height: 85px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }
        .nav-link {
            font-family: 'Poiret One', cursive;
            font-size: 1rem;
            letter-spacing: 1.5px;
            color: #C2DC80;
            background: transparent;
            border: none;
            padding: 0.4rem 0.9rem;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: inline-block;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .nav-link:hover {
            color: #C2DC80;
            transform: translateY(-2px);
        }
        .line {
            height: 3px;
            background: #C2DC80;
            margin: 20px 0;
            opacity: 0.5;
        }
        .hero {
            background: linear-gradient(rgba(153,86,113,0.5), rgba(153,86,113,0.5)), url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 24px;
            margin: 1rem 0;
            padding: 2.5rem 1rem;
            text-align: center;
        }
        .hero h1 {
            font-size: 5rem;
            color: #C2DC80;
            text-shadow: 4px 4px 12px black;
        }
        .hero p {
            font-size: 1.5rem;
            color: #C2DC80;
            margin-top: 0.5rem;
        }
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .product-card {
            background: #C2DC80;
            border: 1px solid #D56989;
            padding: 1.2rem;
            text-align: center;
            border-radius: 12px;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-5px);
            background: #b8d16e;
        }
        .product-card img {
            width: 80%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin: 0 auto 1rem;
        }
        .product-card h3 {
            font-size: 1.5rem;
            color: #D56989;
            text-transform: uppercase;
        }
        .product-card p {
            font-family: system-ui, sans-serif;
            font-size: 0.8rem;
            color: #5b3b45;
            margin: 0.5rem 0;
            flex: 1;
        }
        .price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #D56989;
            border-top: 1px dashed #D56989;
            padding-top: 0.5rem;
            margin: 0.5rem auto;
        }
        button {
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            color: #F3EEF1;
            background: #D56989;
            border: none;
            padding: 0.5rem;
            border-radius: 40px;
            cursor: pointer;
            width: 80%;
            margin: 0 auto;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button:hover { background: #b84d6e; transform: scale(1.02); }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1f5437;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-family: system-ui, sans-serif;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        /* ===== НОВЫЙ ПОДВАЛ КАК НА ГЛАВНОЙ ===== */
        .bottom-block {
            background-image: url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            border-radius: 12px;
            margin-top: 40px;
            padding: 30px 20px 20px;
        }
        .bottom-block::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(153, 86, 113, 0.5);
            border-radius: 12px;
        }
        .bottom-block > * {
            position: relative;
            z-index: 1;
        }
        .footer-info {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            color: #C2DC80;
            margin: 15px 0 30px;
            font-size: 18px;
        }
        .footer-info span {
            transition: 0.2s;
        }
        .footer-info span:hover {
            color: #C2DC80;
            transform: translateY(-2px);
        }
        .footer-social {
            text-align: center;
            padding: 10px 0 10px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .social-link {
            color: #C2DC80;
            text-decoration: none;
            font-size: 20px;
            padding: 6px 18px;
            background: transparent;
            border-radius: 40px;
            transition: 0.2s;
        }
        .social-link:hover {
            background: rgba(193,130,146,0.35);
            color: #C2DC80;
            transform: translateY(-2px);
        }
        .copyright-new {
            font-size: 15px;
            color: #C2DC80;
            letter-spacing: 1px;
            text-align: center;
        }
        /* ===== КОНЕЦ НОВОГО ПОДВАЛА ===== */
        #cartCount {
            background: #D56989;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 5px;
            font-size: 0.8rem;
        }
        @media (max-width: 860px) {
            body { padding: 1rem; }
            .page { padding: 1rem; }
            .header-area { justify-content: center; }
            .hero h1 { font-size: 3rem; }
            .footer-info { flex-direction: column; gap: 15px; text-align: center; }
            .social-links { gap: 15px; }
            .social-link { font-size: 16px; padding: 4px 12px; }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="header-area">
        <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
        <a href="index2.html" class="nav-link">КАТАЛОГ</a>
        <a href="index5.html" class="nav-link">КОНТАКТЫ</a>
        <a href="index3.html" class="nav-link" id="cartLink">КОРЗИНА <span id="cartCount">0</span></a>
        <a href="index4.html" class="nav-link">ЛИЧНЫЙ КАБИНЕТ</a>
    </div>

    <div class="line"></div>

    <div class="hero">
        <h1>ESTÉTICA</h1>
        <p>Создаём любовь через цветы</p>
    </div>

    <div class="line"></div>

    <div class="catalog-grid" id="catalogGrid"></div>

    <!-- НОВЫЙ ПОДВАЛ КАК НА ГЛАВНОЙ СТРАНИЦЕ (старый footer удалён, заменён на этот) -->
    <div class="bottom-block">
        <div class="footer-info">
            <span>✦ Цветы, которых нет у других</span>
            <span>✦ Эксклюзив в каждом стебле</span>
            <span>✦ Скажут больше, чем слова</span>
        </div>

        <div class="footer-social">
            <div class="social-links">
                <a href="https://vk.com" target="_blank" class="social-link">📘 ВКонтакте</a>
                <a href="https://instagram.com" target="_blank" class="social-link">📷 Instagram</a>
                <a href="https://wa.me/79381112274" target="_blank" class="social-link">💬 WhatsApp</a>
            </div>
            <div class="copyright-new">© 2026 Estética — Цветочная мастерская</div>
        </div>
    </div>
</div>

<script>
    // Товары
    const products = [
        { id: 1, name: "Peony Roses", price: 2000, img: "https://i.pinimg.com/1200x/8f/88/a9/8f88a96b3dc7115e5696434d41d2412c.jpg", desc: "Нежные пионовидные розы в оттенке «рассвет»." },
        { id: 2, name: "Lavender Breeze", price: 1800, img: "https://i.pinimg.com/736x/ef/4c/c6/ef4cc6a6d26b8101ce392e7d2af4541a.jpg", desc: "Ароматная композиция из лаванды." },
        { id: 3, name: "Marsala", price: 3500, img: "https://i.pinimg.com/736x/5b/0b/38/5b0b384a0c616035419d72aa8151d57a.jpg", desc: "Роскошные гортензии бордового оттенка." },
        { id: 4, name: "Garden Peonies", price: 2800, img: "https://i.pinimg.com/736x/70/51/fe/7051fe3381836ef00bed9e04b139dc1f.jpg", desc: "Кремово-белые пионы с нежным ароматом." },
        { id: 5, name: "Estética Roses", price: 2300, img: "https://i.pinimg.com/736x/8c/60/b6/8c60b634acfd355e793aa8550d14ee4b.jpg", desc: "Чайно-гибридные розы в винтажной упаковке." },
        { id: 6, name: "Floral Basket", price: 1700, img: "https://i.pinimg.com/1200x/e7/80/bb/e780bb58b35fdadb7c3114126c3703c1.jpg", desc: "Плетёная корзина с полевыми цветами." },
        { id: 7, name: "Roses", price: 4000, img: "https://i.pinimg.com/1200x/59/5e/26/595e26df6c21b9d5bd535b96c21ed0ed.jpg", desc: "Нежные розы, которые дарят тепло." },
        { id: 8, name: "Krokus", price: 3700, img: "https://i.pinimg.com/736x/1d/ff/a3/1dffa3feb0a214ef136ab6ee430d3f71.jpg", desc: "Букет в оттенке «бургунди»." }
    ];

    function getCart() {
        const cart = localStorage.getItem('estetica_cart');
        return cart ? JSON.parse(cart) : [];
    }

    function saveCart(cart) {
        localStorage.setItem('estetica_cart', JSON.stringify(cart));
        updateCartCount();
    }

    function updateCartCount() {
        const cart = getCart();
        const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        const countSpan = document.getElementById('cartCount');
        if (countSpan) countSpan.textContent = totalCount;
    }

    function showToast(message) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function addToCart(productId) {
        const cart = getCart();
        const existingItem = cart.find(item => item.id === productId);
        const product = products.find(p => p.id === productId);
        
        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                img: product.img,
                quantity: 1
            });
        }
        saveCart(cart);
        showToast(`${product.name} добавлен в корзину!`);
    }

    function renderCatalog() {
        const grid = document.getElementById('catalogGrid');
        if (!grid) return;
        grid.innerHTML = products.map(product => `
            <div class="product-card">
                <img src="${product.img}" alt="${product.name}">
                <h3>${product.name}</h3>
                <p>${product.desc}</p>
                <div class="price">${product.price} р</div>
                <button onclick="addToCart(${product.id})">В корзину</button>
            </div>
        `).join('');
    }

    renderCatalog();
    updateCartCount();
</script>
</body>
</html>
