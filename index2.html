<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poiret One',cursive;background:#D56989;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .frame{max-width:1300px;width:100%;background:#F3EEF1;padding:30px;box-shadow:0 20px 35px rgba(0,0,0,0.5)}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;margin-bottom:30px;padding:25px 30px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;position:relative}
        .header::before,.hero::before,.bottom-block::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(153,86,113,0.5)}
        .logo,.nav,.hero h1,.hero p,.bottom-block>*{position:relative;z-index:1}
        .logo{font-size:36px;font-weight:600;color:#C2DC80;text-decoration:none;text-shadow:0 2px 6px rgba(0,0,0,0.5)}
        .nav{display:flex;flex-wrap:wrap;gap:20px}
        .nav a{color:#C2DC80;text-decoration:none;font-size:20px;text-shadow:0 1px 3px rgba(0,0,0,0.3)}
        .hero{text-align:center;padding:80px 20px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin:20px 0;position:relative}
        .hero h1{font-size:54px;color:#C2DC80;text-shadow:2px 2px 6px black}
        .hero p{font-size:22px;color:#C2DC80;margin-top:10px}
        .line{height:3px;background:#C2DC80;margin:30px 0;opacity:.5}
        .categories-block{margin-bottom:30px}
        .categories-title{font-size:28px;color:#D56989;text-align:center;margin-bottom:20px}
        .category-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
        .category-item{background:#C2DC80;border:1px solid #D56989;padding:20px;text-align:center;cursor:pointer;transition:.3s}
        .category-item:hover{transform:translateY(-5px);background:#b8d16e}
        .category-icon{font-size:40px;margin-bottom:10px}
        .category-name{font-size:20px;font-weight:600;color:#D56989}
        .category-count{font-size:14px;color:#5b3b45;margin-top:5px}
        .filters{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:30px;padding:20px;background:#F3EEF1;border:1px solid #C2DC80;align-items:flex-end}
        .filter-group{display:flex;flex-direction:column;gap:8px;min-width:160px}
        .filter-group label{font-size:14px;font-weight:600;color:#D56989;text-transform:uppercase}
        .filter-group select,.filter-group input{padding:10px 12px;background:#F3EEF1;border:1px solid #C2DC80;font-family:inherit;font-size:16px;color:#D56989;cursor:pointer}
        .price-range{display:flex;gap:10px;align-items:center}
        .price-range input{width:100px}
        .filter-btn{background:#D56989;border:none;padding:10px 20px;font-family:inherit;font-size:16px;cursor:pointer;color:#F3EEF1}
        .filter-btn:hover{background:#b84d6e}
        .reset-btn{background:#b84d6e}
        .catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.5rem}
        .product-card{background:#C2DC80;border:1px solid #D56989;padding:1.2rem;text-align:center;transition:.3s}
        .product-card:hover{transform:translateY(-5px);background:#b8d16e}
        .product-card img{width:80%;height:200px;object-fit:cover;margin-bottom:1rem}
        .product-card h3{font-size:1.5rem;color:#D56989;text-transform:uppercase}
        .product-card p{font-family:system-ui;font-size:.8rem;color:#5b3b45;margin:.5rem 0}
        .price{font-size:1.3rem;font-weight:bold;color:#D56989;border-top:1px dashed #D56989;padding-top:.5rem;margin:.5rem auto}
        .product-card button{font-family:inherit;font-size:1rem;font-weight:bold;color:#F3EEF1;background:#D56989;border:none;padding:.5rem;cursor:pointer;width:80%;margin:0 auto;text-transform:uppercase;transition:.2s}
        .product-card button:hover{background:#b84d6e;transform:scale(1.02)}
        .bottom-block{background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin-top:40px;padding:30px 20px 20px;position:relative}
        .footer-info{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;color:#C2DC80;margin:15px 0 30px;font-size:18px}
        .social-links{display:flex;justify-content:center;gap:35px;flex-wrap:wrap;margin-bottom:20px}
        .social-link{color:#C2DC80;text-decoration:none;font-size:20px;padding:6px 18px;transition:.2s}
        .social-link:hover{background:rgba(193,130,146,0.35);transform:translateY(-2px)}
        .copyright{text-align:center;font-size:15px;color:#C2DC80}
        .toast{position:fixed;bottom:30px;right:30px;background:#1f5437;color:white;padding:12px 24px;font-family:system-ui;font-size:14px;z-index:1000;animation:slideIn .3s}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        @media(max-width:700px){.frame{padding:20px}.header{flex-direction:column;text-align:center}.logo{font-size:28px}.nav a{font-size:16px}.hero h1{font-size:38px}.hero{padding:60px 15px}.category-cards{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.filters{flex-direction:column;align-items:stretch}.price-range input{width:100%}.footer-info{flex-direction:column;gap:15px;text-align:center}.social-link{font-size:16px;padding:4px 12px}}
    </style>
</head>
<body>
<div class="frame">
    <div class="header">
        <a href="index.html" class="logo">Estética</a>
        <div class="nav">
            <a href="index.html">ГЛАВНАЯ</a>
            <a href="index2.html">КАТАЛОГ</a>
            <a href="index5.html">КОНТАКТЫ</a>
            <a href="index3.html">КОРЗИНА</a>
            <a href="index4.html">КАБИНЕТ</a>
        </div>
    </div>
    <div class="hero"><h1>ESTÉTICA</h1><p>Создаём любовь через цветы</p></div>
    <div class="line"></div>

    <!-- БЛОК КАТЕГОРИЙ -->
    <div class="categories-block">
        <div class="categories-title">🌸 Выберите категорию</div>
        <div class="category-cards" id="categoryCards"></div>
    </div>
    <div class="line"></div>

    <!-- ФИЛЬТРЫ -->
    <div class="filters">
        <div class="filter-group">
            <label>📂 Категория</label>
            <select id="categoryFilter">
                <option value="all">Все букеты</option>
                <option value="bright">🔥 Яркие</option>
                <option value="gentle">💕 Нежные</option>
                <option value="minimalism">🖤 Минимализм</option>
                <option value="single">🌿 Единичные</option>
            </select>
        </div>
        <div class="filter-group">
            <label>💰 Цена</label>
            <div class="price-range">
                <input type="number" id="priceMin" placeholder="от" value="0">
                <span>—</span>
                <input type="number" id="priceMax" placeholder="до" value="10000">
            </div>
        </div>
        <button class="filter-btn" onclick="applyFilters()">🔍 Применить</button>
        <button class="filter-btn reset-btn" onclick="resetFilters()">🗑 Сбросить</button>
    </div>

    <div class="catalog-grid" id="catalogGrid"></div>

    <div class="bottom-block">
        <div class="footer-info"><span>✦ Цветы, которых нет у других</span><span>✦ Эксклюзив в каждом стебле</span><span>✦ Скажут больше, чем слова</span></div>
        <div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">📘 ВКонтакте</a><a href="https://instagram.com" target="_blank" class="social-link">📷 Instagram</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">💬 WhatsApp</a></div>
        <div class="copyright">© 2026 Estética — Цветочная мастерская</div>
    </div>
</div>

<script>
// ==================== НАСТРОЙКИ JSONBIN.IO ====================
const BIN_ID = '6a0e46146877513b27a708ce';
const MASTER_KEY = '$2a$10$HCH9Xf3UP6Dl1.e9yCDKeO2t9wmeo7tBLhtrewQUQb6YW2q5uQ.ju';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let products = [];
let filteredProducts = [];

// ==================== ЗАГРУЗКА ТОВАРОВ ИЗ JSONBIN ====================
async function loadProducts() {
    try {
        const res = await fetch(API_URL, { headers: { 'X-Master-Key': MASTER_KEY } });
        const data = await res.json();
        const serverProducts = data.record?.products || [];
        
        if (serverProducts.length > 0) {
            products = serverProducts;
        } else {
            // Товары по умолчанию, если в JSONBin ещё ничего нет
            products = [
                { id: 1, name: "Марсала", price: 3500, img: "https://i.pinimg.com/736x/5b/0b/38/5b0b384a0c616035419d72aa8151d57a.jpg", desc: "Роскошные гортензии", cat: "bright" },
                { id: 2, name: "Пламя страсти", price: 4200, img: "https://i.pinimg.com/736x/fa/69/ff/fa69ffefce4cd78c786bc101cffdabcd.jpg", desc: "Ярко-красные розы", cat: "bright" },
                { id: 3, name: "Лавандовый бриз", price: 1800, img: "https://i.pinimg.com/736x/ef/4c/c6/ef4cc6a6d26b8101ce392e7d2af4541a.jpg", desc: "Лаванда и эвкалипт", cat: "gentle" },
                { id: 4, name: "Утренняя роса", price: 2800, img: "https://i.pinimg.com/736x/70/51/fe/7051fe3381836ef00bed9e04b139dc1f.jpg", desc: "Кремово-белые пионы", cat: "gentle" },
                { id: 5, name: "Монохром", price: 2200, img: "https://i.pinimg.com/736x/8c/60/b6/8c60b634acfd355e793aa8550d14ee4b.jpg", desc: "Одна сортность — сила в простоте", cat: "minimalism" },
                { id: 6, name: "Одна роза", price: 500, img: "https://i.pinimg.com/1200x/59/5e/26/595e26df6c21b9d5bd535b96c21ed0ed.jpg", desc: "Классическая роза в упаковке", cat: "single" }
            ];
        }
        
        filteredProducts = [...products];
        renderCategories();
        renderCatalog();
    } catch(e) {
        console.error('Ошибка загрузки:', e);
        // Запасной вариант — товары по умолчанию
        products = [
            { id: 1, name: "Марсала", price: 3500, img: "https://i.pinimg.com/736x/5b/0b/38/5b0b384a0c616035419d72aa8151d57a.jpg", desc: "Роскошные гортензии", cat: "bright" },
            { id: 2, name: "Пламя страсти", price: 4200, img: "https://i.pinimg.com/736x/fa/69/ff/fa69ffefce4cd78c786bc101cffdabcd.jpg", desc: "Ярко-красные розы", cat: "bright" }
        ];
        filteredProducts = [...products];
        renderCategories();
        renderCatalog();
    }
}

// ==================== КОРЗИНА ====================
function getCart() { return JSON.parse(localStorage.getItem('estetica_cart') || '[]'); }
function saveCart(c) { localStorage.setItem('estetica_cart', JSON.stringify(c)); updateCartCount(); }
function updateCartCount() { 
    let total = getCart().reduce((s,i)=>s+i.quantity,0); 
    let link = document.querySelector('.nav a[href="index3.html"]'); 
    if(link) link.innerHTML = total>0 ? `КОРЗИНА 🛒(${total})` : `КОРЗИНА`; 
}
function showToast(m) { 
    let t = document.querySelector('.toast'); if(t) t.remove(); 
    t = document.createElement('div'); t.className = 'toast'; t.textContent = m; 
    document.body.appendChild(t); setTimeout(()=>t.remove(),2000); 
}
function addToCart(id) { 
    let cart = getCart(), item = cart.find(i=>i.id===id), p = products.find(p=>p.id===id); 
    if(item) item.quantity++; 
    else cart.push({id:p.id,name:p.name,price:p.price,img:p.img,quantity:1}); 
    saveCart(cart); showToast(`${p.name} добавлен в корзину!`); 
}

// ==================== ФИЛЬТРАЦИЯ ====================
function applyFilters() {
    let cat = document.getElementById('categoryFilter').value;
    let min = +document.getElementById('priceMin').value || 0;
    let max = +document.getElementById('priceMax').value || 10000;
    filteredProducts = products.filter(p => (cat === 'all' || p.cat === cat) && p.price >= min && p.price <= max);
    renderCatalog();
}
function resetFilters() {
    document.getElementById('categoryFilter').value = 'all';
    document.getElementById('priceMin').value = 0;
    document.getElementById('priceMax').value = 10000;
    filteredProducts = [...products];
    renderCatalog();
}
function filterByCat(cat) { document.getElementById('categoryFilter').value = cat; applyFilters(); }

function renderCatalog() {
    const grid = document.getElementById('catalogGrid');
    if(filteredProducts.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#D56989;font-size:24px;">🌸 Ничего не найдено 🌸</div>';
        return;
    }
    grid.innerHTML = filteredProducts.map(p => `
        <div class="product-card">
            <img src="${p.img}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
            <div class="price">${p.price} ₽</div>
            <button onclick="addToCart(${p.id})">В корзину</button>
        </div>
    `).join('');
}

function renderCategories() {
    const cats = [
        {id:"bright", name:"🔥 Яркие букеты", icon:"🔥", count: products.filter(p => p.cat === "bright").length},
        {id:"gentle", name:"💕 Нежные букеты", icon:"💕", count: products.filter(p => p.cat === "gentle").length},
        {id:"minimalism", name:"🖤 Минимализм", icon:"🖤", count: products.filter(p => p.cat === "minimalism").length},
        {id:"single", name:"🌿 Единичная позиция", icon:"🌿", count: products.filter(p => p.cat === "single").length}
    ];
    document.getElementById('categoryCards').innerHTML = cats.map(c => `
        <div class="category-item" onclick="filterByCat('${c.id}')">
            <div class="category-icon">${c.icon}</div>
            <div class="category-name">${c.name}</div>
            <div class="category-count">${c.count} товаров</div>
        </div>
    `).join('');
}

// ==================== ЗАПУСК ====================
loadProducts();
updateCartCount();
</script>
</body>
</html>
