<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Каталог | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poiret One',cursive;background:#D56989;padding:15px}
        .frame{max-width:1300px;margin:0 auto;background:#F3EEF1;padding:25px;box-shadow:0 20px 35px rgba(0,0,0,0.5)}
        .header{display:flex;justify-content:space-between;flex-wrap:wrap;gap:15px;margin-bottom:25px;padding:15px 20px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;position:relative}
        .header::before,.hero::before,.bottom-block::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(153,86,113,0.5)}
        .logo,.nav,.hero h1,.hero p,.bottom-block>*{position:relative;z-index:1}
        .logo{font-size:28px;font-weight:600;color:#C2DC80;text-decoration:none}
        .nav{display:flex;flex-wrap:wrap;gap:8px}
        .nav a{color:#C2DC80;text-decoration:none;font-size:14px;padding:6px 10px}
        .hero{text-align:center;padding:40px 15px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin:15px 0;position:relative}
        .hero h1{font-size:32px;color:#C2DC80}
        .hero p{font-size:16px;color:#C2DC80}
        .line{height:2px;background:#C2DC80;margin:20px 0;opacity:.5}
        .categories-title{font-size:24px;color:#D56989;text-align:center;margin-bottom:15px}
        .category-cards{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
        .category-item{background:#C2DC80;border:1px solid #D56989;padding:15px;text-align:center;cursor:pointer;transition:.3s}
        .category-item:hover{transform:translateY(-3px);background:#b8d16e}
        .category-name{font-size:16px;font-weight:600;color:#D56989}
        .category-count{font-size:12px;color:#5b3b45}
        .filters{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding:15px;background:#F3EEF1;border:1px solid #C2DC80}
        .filter-group{display:flex;flex-direction:column;gap:5px;flex:1}
        .filter-group label{font-size:12px;font-weight:600;color:#D56989}
        .filter-group select,.filter-group input{padding:8px 10px;background:#F3EEF1;border:1px solid #C2DC80;font-family:inherit}
        .price-range{display:flex;gap:8px;align-items:center}
        .price-range input{width:80px}
        .filter-btn{background:#D56989;border:none;padding:8px 15px;cursor:pointer;color:#F3EEF1}
        .reset-btn{background:#b84d6e}
        .catalog-grid{display:grid;gap:15px;grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
        .product-card{background:#C2DC80;border:1px solid #D56989;padding:15px;text-align:center;transition:.3s}
        .product-card:hover{transform:translateY(-3px);background:#b8d16e}
        .product-card img{width:80%;height:200px;object-fit:cover}
        .product-card h3{font-size:18px;color:#D56989}
        .price{font-size:18px;font-weight:bold;color:#D56989;margin:10px 0}
        .card-buttons{display:flex;gap:8px;justify-content:center}
        .card-buttons button{padding:8px 12px;cursor:pointer;border:none}
        .cart-btn{background:#D56989;color:#F3EEF1}
        .details-btn{background:#F3EEF1;color:#D56989;border:1px solid #D56989}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center}
        .modal-content{background:#F3EEF1;max-width:550px;width:90%;max-height:85vh;overflow-y:auto;padding:20px;border:2px solid #C2DC80}
        .modal-content img{width:100%;height:350px;object-fit:cover}
        .modal-content h3{font-size:24px;color:#D56989}
        .modal-price{font-size:22px;font-weight:bold;color:#D56989;margin:10px 0}
        .modal-close{position:absolute;top:10px;right:20px;font-size:30px;cursor:pointer;color:#D56989}
        .modal-add-btn{background:#D56989;color:#F3EEF1;border:none;padding:12px;width:100%;cursor:pointer}
        .bottom-block{background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin-top:30px;padding:25px 15px 15px;position:relative}
        .footer-info{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;color:#C2DC80;font-size:13px}
        .social-links{display:flex;justify-content:center;gap:15px;margin:15px 0}
        .social-link{color:#C2DC80;text-decoration:none}
        .copyright{text-align:center;font-size:11px;color:#C2DC80}
        .toast{position:fixed;bottom:20px;left:20px;right:20px;background:#1f5437;color:white;padding:12px;text-align:center;z-index:1001;animation:slideIn .3s}
        @keyframes slideIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @media (max-width:480px){.frame{padding:12px}.logo{font-size:22px}.catalog-grid{grid-template-columns:1fr}.filters{flex-direction:column}}
    </style>
</head>
<body>
<div class="frame">
    <div class="header">
        <a href="index.html" class="logo">Estética</a>
        <div class="nav">
            <a href="index.html">ГЛАВНАЯ</a>
            <a href="index2.html">КАТАЛОГ</a>
            <a href="index5.html">КОНТАКТЫ</a>
            <a href="index3.html">КОРЗИНА</a>
            <a href="index4.html">КАБИНЕТ</a>
        </div>
    </div>
    <div class="hero"><h1>ESTÉTICA</h1><p>Создаём любовь через цветы</p></div>
    <div class="line"></div>
    <div class="categories-block">
        <div class="categories-title">Выберите категорию</div>
        <div class="category-cards" id="categoryCards"></div>
    </div>
    <div class="line"></div>
    <div class="filters">
        <div class="filter-group"><label>Категория</label><select id="categoryFilter"><option value="all">Все букеты</option></select></div>
        <div class="filter-group"><label>Цена</label><div class="price-range"><input type="number" id="priceMin" placeholder="от" value="0"><span>—</span><input type="number" id="priceMax" placeholder="до" value="10000"></div></div>
        <button class="filter-btn" onclick="applyFilters()">Применить</button>
        <button class="filter-btn reset-btn" onclick="resetFilters()">Сбросить</button>
    </div>
    <div class="catalog-grid" id="catalogGrid">Загрузка товаров...</div>
    <div class="bottom-block">
        <div class="footer-info"><span>Цветы, которых нет у других</span><span>Эксклюзив в каждом стебле</span><span>Скажут больше, чем слова</span></div>
        <div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">ВКонтакте</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">WhatsApp</a></div>
        <div class="copyright">2026 Estética Цветочная мастерская</div>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="" alt="">
        <h3 id="modalName"></h3>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-cat" id="modalCat"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <button class="modal-add-btn" onclick="addToCartFromModal()">В корзину</button>
    </div>
</div>

<script>
const API_URL = 'https://functions.yandexcloud.net/d4en7rg8osirq7m9ukq5';
let products = [];
let categories = [];
let filteredProducts = [];
let currentModalProduct = null;

async function callApi(action, data = {}) {
    const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, data })
    });
    return await res.json();
}

function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function showToast(m) { let t = document.querySelector('.toast'); if (t) t.remove(); t = document.createElement('div'); t.className = 'toast'; t.textContent = m; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }

// Корзина
function getCart() { return JSON.parse(localStorage.getItem('estetica_cart') || '[]'); }
function saveCart(c) { localStorage.setItem('estetica_cart', JSON.stringify(c)); updateCartCount(); }
function updateCartCount() { let t = getCart().reduce((s,i)=>s+i.quantity,0); let l = document.querySelector('.nav a[href="index3.html"]'); if(l) l.innerHTML = t > 0 ? `КОРЗИНА (${t})` : `КОРЗИНА`; }
function addToCart(id) { let cart = getCart(), item = cart.find(i=>i.id===id), p = products.find(p=>p.id===id); if(!p) return; if(item) item.quantity++; else cart.push({id:p.id, name:p.name, price:p.price, img:p.img, quantity:1, category_id: p.category_id}); saveCart(cart); showToast(`${p.name} добавлен в корзину!`); }
function addToCartFromModal() { if(currentModalProduct) addToCart(currentModalProduct.id); closeModal(); }

// Модальное окно
function showDetails(product) { 
    currentModalProduct = product; 
    document.getElementById('modalImg').src = product.img; 
    document.getElementById('modalName').innerText = product.name; 
    document.getElementById('modalPrice').innerText = `${product.price} ₽`; 
    const cat = categories.find(c => c.id == product.category_id);
    document.getElementById('modalCat').innerHTML = `Категория: ${cat ? cat.name : 'Без категории'}`; 
    document.getElementById('modalDesc').innerHTML = product.full_desc || product.short_desc || 'Красивый букет от Estética.'; 
    document.getElementById('productModal').style.display = 'flex'; 
}
function closeModal() { document.getElementById('productModal').style.display = 'none'; currentModalProduct = null; }

// Фильтрация
function applyFilters() {
    let catId = document.getElementById('categoryFilter').value;
    let min = +document.getElementById('priceMin').value || 0;
    let max = +document.getElementById('priceMax').value || 10000;
    filteredProducts = products.filter(p => {
        let matchCategory = (catId === 'all' || p.category_id == catId);
        let matchPrice = (p.price >= min && p.price <= max);
        return matchCategory && matchPrice;
    });
    renderCatalog();
}
function resetFilters() {
    document.getElementById('categoryFilter').value = 'all';
    document.getElementById('priceMin').value = 0;
    document.getElementById('priceMax').value = 10000;
    filteredProducts = [...products];
    renderCatalog();
}
function filterByCat(catId) {
    document.getElementById('categoryFilter').value = catId;
    applyFilters();
}

// Отображение
function renderCatalog() {
    const grid = document.getElementById('catalogGrid');
    if (!filteredProducts.length) { grid.innerHTML = '<div style="text-align:center;padding:40px;">Ничего не найдено</div>'; return; }
    grid.innerHTML = filteredProducts.map(p => `
        <div class="product-card">
            <img src="${p.img}" alt="${escapeHtml(p.name)}" loading="lazy">
            <h3>${escapeHtml(p.name)}</h3>
            <div class="price">${p.price} ₽</div>
            <div class="card-buttons">
                <button class="cart-btn" onclick="addToCart(${p.id})">В корзину</button>
                <button class="details-btn" onclick='showDetails(${JSON.stringify(p).replace(/'/g, "&#39;")})'>Подробнее</button>
            </div>
        </div>
    `).join('');
}

function renderCategories() {
    const select = document.getElementById('categoryFilter');
    let selectHtml = '<option value="all">Все букеты</option>';
    let cardsHtml = '';
    for (let cat of categories) {
        const count = products.filter(p => p.category_id == cat.id).length;
        selectHtml += `<option value="${cat.id}">${escapeHtml(cat.name)}</option>`;
        cardsHtml += `<div class="category-item" onclick="filterByCat(${cat.id})"><div class="category-name">${escapeHtml(cat.name)}</div><div class="category-count">${count} товаров</div></div>`;
    }
    select.innerHTML = selectHtml;
    document.getElementById('categoryCards').innerHTML = cardsHtml;
}

// Загрузка данных
async function loadData() {
    try {
        const [prods, cats] = await Promise.all([
            callApi('getProducts'),
            callApi('getCategories')
        ]);
        if (prods?.success) products = prods.products;
        if (cats?.success) categories = cats.categories;
        filteredProducts = [...products];
        renderCategories();
        renderCatalog();
    } catch(e) { console.error(e); document.getElementById('catalogGrid').innerHTML = '<div style="text-align:center;padding:40px;">Ошибка загрузки товаров</div>'; }
}

document.addEventListener('click', e => { if(e.target === document.getElementById('productModal')) closeModal(); });
loadData();
updateCartCount();
</script>
</body>
</html>
