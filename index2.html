<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Каталог | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poiret One',cursive;background:#D56989;padding:15px}
        .frame{max-width:1300px;margin:0 auto;background:#F3EEF1;padding:25px;box-shadow:0 20px 35px rgba(0,0,0,0.5)}
        
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;margin-bottom:25px;padding:15px 20px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;position:relative}
        .header::before,.hero::before,.bottom-block::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(153,86,113,0.5)}
        .logo,.nav,.hero h1,.hero p,.bottom-block>*{position:relative;z-index:1}
        .logo{font-size:28px;font-weight:600;color:#C2DC80;text-decoration:none}
        .nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .nav a{color:#C2DC80;text-decoration:none;font-size:14px;padding:6px 10px;white-space:nowrap}
        
        .hero{text-align:center;padding:40px 15px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin:15px 0;position:relative}
        .hero h1{font-size:32px;color:#C2DC80;text-shadow:2px 2px 6px black}
        .hero p{font-size:16px;color:#C2DC80;margin-top:8px}
        .line{height:2px;background:#C2DC80;margin:20px 0;opacity:.5}
        
        .filters{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding:15px;background:#F3EEF1;border:1px solid #C2DC80;align-items:flex-end}
        .filter-group{display:flex;flex-direction:column;gap:5px;min-width:140px;flex:1}
        .filter-group label{font-size:12px;font-weight:600;color:#D56989;text-transform:uppercase}
        .filter-group select,.filter-group input{padding:8px 10px;background:#F3EEF1;border:1px solid #C2DC80;font-family:inherit;font-size:14px;color:#D56989}
        .price-range{display:flex;gap:8px;align-items:center}
        .price-range input{width:80px}
        .filter-btn{background:#D56989;border:none;padding:8px 15px;font-family:inherit;font-size:14px;cursor:pointer;color:#F3EEF1}
        .reset-btn{background:#b84d6e}
        
        .catalog-grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
        
        .product-card{
            background:#C2DC80;
            border:1px solid #D56989;
            padding:20px;
            text-align:center;
            transition:.3s;
            display:flex;
            flex-direction:column;
            position:relative;
        }
        .product-card:hover{transform:translateY(-5px);background:#b8d16e}
        .product-card img{width:100%;height:220px;object-fit:cover;margin-bottom:15px}
        .product-card h3{font-size:20px;color:#D56989;margin:10px 0 5px}
        .price{font-size:24px;font-weight:bold;color:#D56989;margin:10px 0}
        .card-buttons{display:flex;gap:12px;justify-content:center;margin-top:10px}
        .card-buttons button{
            font-family:inherit;
            font-size:14px;
            font-weight:bold;
            padding:8px 16px;
            cursor:pointer;
            border:none;
            border-radius:40px;
            transition:.2s;
        }
        .cart-btn{background:#D56989;color:#F3EEF1}
        .cart-btn:hover{background:#b84d6e;transform:scale(1.02)}
        .details-btn{background:#F3EEF1;color:#D56989;border:1px solid #D56989}
        .details-btn:hover{background:#D56989;color:#F3EEF1}
        
        .modal{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.85);
            z-index:1000;
            justify-content:center;
            align-items:center;
        }
        .modal-content{
            background:#F3EEF1;
            max-width:550px;
            width:90%;
            max-height:85vh;
            overflow-y:auto;
            padding:25px;
            border:2px solid #C2DC80;
            position:relative;
            border-radius:0;
        }
        .modal-close{
            position:absolute;
            top:12px;
            right:18px;
            font-size:32px;
            cursor:pointer;
            color:#D56989;
            transition:.2s;
        }
        .modal-close:hover{color:#b84d6e}
        .modal-content img{width:100%;height:300px;object-fit:cover;margin-bottom:20px}
        .modal-content h3{font-size:28px;color:#D56989;margin-bottom:10px}
        .modal-price{font-size:26px;font-weight:bold;color:#D56989;margin:15px 0}
        .modal-cat{font-size:14px;color:#D56989;margin:10px 0;padding-bottom:10px;border-bottom:1px solid #C2DC80}
        .modal-desc{font-size:16px;color:#5b3b45;line-height:1.6;margin:15px 0}
        .modal-add-btn{
            background:#D56989;
            color:#F3EEF1;
            border:none;
            padding:14px;
            font-family:inherit;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
            width:100%;
            margin-top:20px;
            transition:.2s;
        }
        .modal-add-btn:hover{background:#b84d6e}
        
        .bottom-block{background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin-top:30px;padding:25px 15px 15px;position:relative}
        .footer-info{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;color:#C2DC80;margin:10px 0 20px;font-size:13px;text-align:center}
        .social-links{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin-bottom:15px}
        .social-link{color:#C2DC80;text-decoration:none;font-size:14px;padding:6px 12px}
        .social-link:hover{background:rgba(193,130,146,0.35)}
        .copyright{text-align:center;font-size:11px;color:#C2DC80}
        .toast{position:fixed;bottom:20px;right:20px;left:20px;background:#1f5437;color:white;padding:12px;text-align:center;font-family:system-ui;font-size:13px;z-index:1001;animation:slideIn .3s ease;border-radius:30px}
        @keyframes slideIn{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        
        @media (max-width:700px){
            .frame{padding:15px}
            .header{flex-direction:column;text-align:center}
            .catalog-grid{grid-template-columns:1fr}
            .product-card img{height:200px}
            .modal-content img{height:220px}
            .card-buttons{flex-direction:column;align-items:center}
            .card-buttons button{width:100%}
        }
        @media (min-width:701px) and (max-width:1024px){
            .catalog-grid{grid-template-columns:repeat(2,1fr)}
        }
        @media (min-width:1025px){
            .catalog-grid{grid-template-columns:repeat(4,1fr)}
        }
    </style>
</head>
<body>
<div class="frame">
    <div class="header">
        <a href="index.html" class="logo">Estética</a>
        <div class="nav">
            <a href="index.html">ГЛАВНАЯ</a>
            <a href="index2.html">КАТАЛОГ</a>
            <a href="index5.html">КОНТАКТЫ</a>
            <a href="index3.html">КОРЗИНА</a>
            <a href="index4.html">КАБИНЕТ</a>
        </div>
    </div>

    <div class="hero"><h1>ESTÉTICA</h1><p>Создаём любовь через цветы</p></div>
    <div class="line"></div>

    <div class="filters">
        <div class="filter-group"><label>Категория</label><select id="categoryFilter"><option value="all">Все букеты</option><option value="bright">Яркие</option><option value="gentle">Нежные</option><option value="minimalism">Минимализм</option><option value="single">Единичные</option></select></div>
        <div class="filter-group"><label>Цена</label><div class="price-range"><input type="number" id="priceMin" placeholder="от" value="0"><span>—</span><input type="number" id="priceMax" placeholder="до" value="10000"></div></div>
        <button class="filter-btn" onclick="applyFilters()">Применить</button>
        <button class="filter-btn reset-btn" onclick="resetFilters()">Сбросить</button>
    </div>

    <div class="catalog-grid" id="catalogGrid"></div>

    <div class="bottom-block">
        <div class="footer-info"><span>Цветы, которых нет у других</span><span>Эксклюзив в каждом стебле</span><span>Скажут больше, чем слова</span></div>
        <div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">ВКонтакте</a><a href="https://instagram.com" target="_blank" class="social-link">Instagram</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">WhatsApp</a></div>
        <div class="copyright">2026 Estética Цветочная мастерская</div>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="" alt="">
        <h3 id="modalName"></h3>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-cat" id="modalCat"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <button class="modal-add-btn" id="modalAddBtn" onclick="addToCartFromModal()">В корзину</button>
    </div>
</div>

<script>
const BIN_ID = '6a0e46146877513b27a708ce';
const MASTER_KEY = '$2a$10$HCH9Xf3UP6Dl1.e9yCDKeO2t9wmeo7tBLhtrewQUQb6YW2q5uQ.ju';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let allProducts = [];
let currentModalProduct = null;

async function getData() {
    const res = await fetch(API_URL, { headers: { 'X-Master-Key': MASTER_KEY } });
    const data = await res.json();
    return data.record || { users: [], orders: [], messages: [], products: [], promos: [], reviews: [] };
}

async function loadProducts() {
    const data = await getData();
    allProducts = data.products || [];
    renderCatalog();
}

// ========== КОРЗИНА ==========
function getCart() { return JSON.parse(localStorage.getItem('estetica_cart') || '[]'); }
function saveCart(c) { localStorage.setItem('estetica_cart', JSON.stringify(c)); updateCartCount(); }
function updateCartCount() { 
    let total = getCart().reduce((s,i)=>s+i.quantity,0); 
    let link = document.querySelector('.nav a[href="index3.html"]'); 
    if(link) link.innerHTML = total > 0 ? `КОРЗИНА (${total})` : `КОРЗИНА`; 
}
function showToast(m) { 
    let t = document.querySelector('.toast'); if(t) t.remove(); 
    t = document.createElement('div'); t.className = 'toast'; t.textContent = m; 
    document.body.appendChild(t); setTimeout(()=>t.remove(),2000); 
}
function addToCart(id) { 
    let cart = getCart(), item = cart.find(i=>i.id===id), p = allProducts.find(p=>p.id===id); 
    if(item) item.quantity++; 
    else cart.push({id:p.id,name:p.name,price:p.price,img:p.img,quantity:1}); 
    saveCart(cart); showToast(`${p.name} добавлен в корзину!`); 
}
function addToCartFromModal() { if(currentModalProduct) addToCart(currentModalProduct.id); closeModal(); }

// ========== МОДАЛЬНОЕ ОКНО ==========
function showDetails(product) {
    currentModalProduct = product;
    document.getElementById('modalImg').src = product.img;
    document.getElementById('modalName').innerText = product.name;
    document.getElementById('modalPrice').innerHTML = `${product.price} ₽`;
    const catNames = {bright:'Яркие букеты', gentle:'Нежные букеты', minimalism:'Минимализм', single:'Единичная позиция'};
    document.getElementById('modalCat').innerHTML = `Категория: ${catNames[product.cat] || product.cat}`;
    document.getElementById('modalDesc').innerHTML = product.full_desc || product.short_desc || 'Красивый букет от Estética. Свежие цветы, бережная упаковка.';
    document.getElementById('productModal').style.display = 'flex';
}
function closeModal() { document.getElementById('productModal').style.display = 'none'; currentModalProduct = null; }

// ========== ФИЛЬТРЫ ==========
function applyFilters() {
    let cat = document.getElementById('categoryFilter').value;
    let min = +document.getElementById('priceMin').value || 0;
    let max = +document.getElementById('priceMax').value || 10000;
    let filtered = allProducts.filter(p => (cat === 'all' || p.cat === cat) && p.price >= min && p.price <= max);
    renderCatalog(filtered);
}
function resetFilters() {
    document.getElementById('categoryFilter').value = 'all';
    document.getElementById('priceMin').value = 0;
    document.getElementById('priceMax').value = 10000;
    renderCatalog(allProducts);
}

function renderCatalog(products = allProducts) {
    const grid = document.getElementById('catalogGrid');
    if(products.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#D56989;">Ничего не найдено</div>';
        return;
    }
    grid.innerHTML = products.map(p => `
        <div class="product-card">
            <img src="${p.img}" alt="${p.name}" loading="lazy">
            <h3>${p.name}</h3>
            <div class="price">${p.price} ₽</div>
            <div class="card-buttons">
                <button class="cart-btn" onclick="addToCart(${p.id})">В корзину</button>
                <button class="details-btn" onclick='showDetails(${JSON.stringify(p).replace(/'/g, "&#39;")})'>О товаре</button>
            </div>
        </div>
    `).join('');
}

document.addEventListener('click', function(e) { if(e.target === document.getElementById('productModal')) closeModal(); });

loadProducts();
updateCartCount();
</script>
</body>
</html>
