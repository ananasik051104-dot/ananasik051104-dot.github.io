<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Каталог | Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:'Poiret One',cursive;background:#D56989;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:15px}
        .frame{max-width:1300px;width:100%;background:#F3EEF1;padding:25px;box-shadow:0 20px 35px rgba(0,0,0,0.5)}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;margin-bottom:25px;padding:15px 20px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;position:relative}
        .header::before,.hero::before,.bottom-block::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(153,86,113,0.5)}
        .logo,.nav,.hero h1,.hero p,.bottom-block>*{position:relative;z-index:1}
        .logo{font-size:28px;font-weight:600;color:#C2DC80;text-decoration:none;text-shadow:0 2px 6px rgba(0,0,0,0.5)}
        .nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .nav a{color:#C2DC80;text-decoration:none;font-size:14px;padding:6px 10px;text-shadow:0 1px 3px rgba(0,0,0,0.3);white-space:nowrap}
        .hero{text-align:center;padding:40px 15px;background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin:15px 0;position:relative}
        .hero h1{font-size:32px;color:#C2DC80;text-shadow:2px 2px 6px black}
        .hero p{font-size:16px;color:#C2DC80;margin-top:8px}
        .line{height:2px;background:#C2DC80;margin:20px 0;opacity:.5}
        .categories-block{margin-bottom:20px}
        .categories-title{font-size:24px;color:#D56989;text-align:center;margin-bottom:15px}
        .category-cards{display:grid;gap:12px}
        .category-item{background:#C2DC80;border:1px solid #D56989;padding:15px;text-align:center;cursor:pointer;transition:.3s}
        .category-item:hover{transform:translateY(-3px);background:#b8d16e}
        .category-icon{font-size:32px;margin-bottom:8px}
        .category-name{font-size:16px;font-weight:600;color:#D56989}
        .category-count{font-size:12px;color:#5b3b45;margin-top:4px}
        .filters{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding:15px;background:#F3EEF1;border:1px solid #C2DC80;align-items:flex-end}
        .filter-group{display:flex;flex-direction:column;gap:5px;min-width:140px;flex:1}
        .filter-group label{font-size:12px;font-weight:600;color:#D56989;text-transform:uppercase}
        .filter-group select,.filter-group input{padding:8px 10px;background:#F3EEF1;border:1px solid #C2DC80;font-family:inherit;font-size:14px;color:#D56989}
        .price-range{display:flex;gap:8px;align-items:center}
        .price-range input{width:80px}
        .filter-btn{background:#D56989;border:none;padding:8px 15px;font-family:inherit;font-size:14px;cursor:pointer;color:#F3EEF1}
        .reset-btn{background:#b84d6e}
        .catalog-grid{display:grid;gap:15px}
        .product-card{background:#C2DC80;border:1px solid #D56989;padding:15px;text-align:center;transition:.3s}
        .product-card:hover{transform:translateY(-3px);background:#b8d16e}
        .product-card img{width:80%;height:200px;object-fit:cover;margin-bottom:12px}
        .product-card h3{font-size:18px;color:#D56989;text-transform:uppercase}
        .product-card p{font-family:system-ui;font-size:12px;color:#5b3b45;margin:8px 0}
        .price{font-size:18px;font-weight:bold;color:#D56989;border-top:1px dashed #D56989;padding-top:8px;margin:8px auto}
        .card-buttons{display:flex;gap:8px;justify-content:center;margin-top:10px}
        .card-buttons button{font-family:inherit;font-size:13px;font-weight:bold;padding:8px 12px;cursor:pointer;border:none}
        .cart-btn{background:#D56989;color:#F3EEF1}
        .cart-btn:hover{background:#b84d6e}
        .details-btn{background:#F3EEF1;color:#D56989;border:1px solid #D56989}
        .details-btn:hover{background:#D56989;color:#F3EEF1}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center}
        .modal-content{background:#F3EEF1;max-width:500px;width:90%;max-height:85vh;overflow-y:auto;padding:20px;border:2px solid #C2DC80}
        .modal-content img{width:100%;height:250px;object-fit:cover;margin-bottom:15px}
        .modal-content h3{font-size:24px;color:#D56989;margin-bottom:10px}
        .modal-price{font-size:22px;font-weight:bold;color:#D56989;margin:10px 0}
        .modal-desc{font-size:14px;color:#5b3b45;line-height:1.5;margin:15px 0}
        .modal-cat{font-size:12px;color:#D56989;margin:10px 0}
        .modal-close{position:absolute;top:10px;right:20px;font-size:30px;cursor:pointer;color:#D56989}
        .modal-add-btn{background:#D56989;color:#F3EEF1;border:none;padding:12px;font-family:inherit;font-size:16px;cursor:pointer;width:100%;margin-top:15px}
        .bottom-block{background-image:url('https://i.pinimg.com/1200x/c5/1d/bd/c51dbd218c0f906c8d31713dd398ebb5.jpg');background-size:cover;margin-top:30px;padding:25px 15px 15px;position:relative}
        .footer-info{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;color:#C2DC80;margin:10px 0 20px;font-size:13px;text-align:center}
        .social-links{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin-bottom:15px}
        .social-link{color:#C2DC80;text-decoration:none;font-size:14px;padding:6px 12px}
        .social-link:hover{background:rgba(193,130,146,0.35)}
        .copyright{text-align:center;font-size:11px;color:#C2DC80}
        .toast{position:fixed;bottom:20px;right:20px;left:20px;background:#1f5437;color:white;padding:12px;text-align:center;font-family:system-ui;font-size:13px;z-index:1001;animation:slideIn .3s ease}
        @keyframes slideIn{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        @media (max-width:480px){
            .frame{padding:12px}
            .logo{font-size:22px}
            .nav a{font-size:11px;padding:4px 6px}
            .hero h1{font-size:24px}
            .categories-title{font-size:20px}
            .category-cards{grid-template-columns:repeat(2,1fr);gap:8px}
            .category-item{padding:10px}
            .category-icon{font-size:28px}
            .category-name{font-size:13px}
            .filters{flex-direction:column}
            .catalog-grid{grid-template-columns:1fr}
            .product-card img{width:70%;height:180px}
        }
        @media (min-width:481px) and (max-width:768px){
            .category-cards{grid-template-columns:repeat(4,1fr)}
            .catalog-grid{grid-template-columns:repeat(2,1fr)}
        }
        @media (min-width:769px) and (max-width:1024px){
            .category-cards{grid-template-columns:repeat(4,1fr)}
            .catalog-grid{grid-template-columns:repeat(3,1fr)}
        }
        @media (min-width:1025px){
            .category-cards{grid-template-columns:repeat(4,1fr)}
            .catalog-grid{grid-template-columns:repeat(4,1fr)}
            .nav a{font-size:18px}
        }
    </style>
</head>
<body>
<div class="frame">
    <div class="header"><a href="index.html" class="logo">Estética</a><div class="nav"><a href="index.html">ГЛАВНАЯ</a><a href="index2.html">КАТАЛОГ</a><a href="index5.html">КОНТАКТЫ</a><a href="index3.html">КОРЗИНА</a><a href="index4.html">КАБИНЕТ</a></div></div>
    <div class="hero"><h1>ESTÉTICA</h1><p>Создаём любовь через цветы</p></div>
    <div class="line"></div>
    <div class="categories-block"><div class="categories-title">Выберите категорию</div><div class="category-cards" id="categoryCards"></div></div>
    <div class="line"></div>
    <div class="filters">
        <div class="filter-group"><label>Категория</label><select id="categoryFilter"><option value="all">Все букеты</option><option value="bright">Яркие</option><option value="gentle">Нежные</option><option value="minimalism">Минимализм</option><option value="single">Единичные</option></select></div>
        <div class="filter-group"><label>Цена</label><div class="price-range"><input type="number" id="priceMin" placeholder="от" value="0"><span>—</span><input type="number" id="priceMax" placeholder="до" value="10000"></div></div>
        <button class="filter-btn" onclick="applyFilters()">Применить</button>
        <button class="filter-btn reset-btn" onclick="resetFilters()">Сбросить</button>
    </div>
    <div class="catalog-grid" id="catalogGrid"></div>
    <div class="bottom-block"><div class="footer-info"><span>Цветы, которых нет у других</span><span>Эксклюзив в каждом стебле</span><span>Скажут больше, чем слова</span></div><div class="social-links"><a href="https://vk.com" target="_blank" class="social-link">ВКонтакте</a><a href="https://instagram.com" target="_blank" class="social-link">Instagram</a><a href="https://wa.me/79381112274" target="_blank" class="social-link">WhatsApp</a></div><div class="copyright">2026 Estética Цветочная мастерская</div></div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="" alt="">
        <h3 id="modalName"></h3>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-cat" id="modalCat"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <button class="modal-add-btn" id="modalAddBtn" onclick="addToCartFromModal()">Добавить в корзину</button>
    </div>
</div>

<script>
const BIN_ID = '6a0e46146877513b27a708ce';
const MASTER_KEY = '$2a$10$HCH9Xf3UP6Dl1.e9yCDKeO2t9wmeo7tBLhtrewQUQb6YW2q5uQ.ju';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
let products = [], filteredProducts = [], currentModalProduct = null;

async function loadProducts() {
    try {
        const res = await fetch(API_URL, { headers: { 'X-Master-Key': MASTER_KEY } });
        const data = await res.json();
        const serverProducts = data.record?.products || [];
        if (serverProducts.length > 0) products = serverProducts;
        else products = [
            { id: 1, name: "Марсала", price: 3500, img: "https://i.pinimg.com/736x/5b/0b/38/5b0b384a0c616035419d72aa8151d57a.jpg", desc: "Роскошные гортензии", cat: "bright", fullDesc: "Букет из крупных гортензий. Подходит для особых случаев." },
            { id: 2, name: "Пламя страсти", price: 4200, img: "https://i.pinimg.com/736x/fa/69/ff/fa69ffefce4cd78c786bc101cffdabcd.jpg", desc: "Ярко-красные розы", cat: "bright", fullDesc: "Букет из 25 алых роз. Высота букета 50 см." }
        ];
        filteredProducts = [...products];
        renderCategories();
        renderCatalog();
    } catch(e) { console.error(e); }
}
function getCart() { return JSON.parse(localStorage.getItem('estetica_cart') || '[]'); }
function saveCart(c) { localStorage.setItem('estetica_cart', JSON.stringify(c)); updateCartCount(); }
function updateCartCount() { let t = getCart().reduce((s,i)=>s+i.quantity,0); let l = document.querySelector('.nav a[href="index3.html"]'); if(l) l.innerHTML = t>0 ? `КОРЗИНА (${t})` : `КОРЗИНА`; }
function showToast(m) { let t = document.querySelector('.toast'); if(t) t.remove(); t = document.createElement('div'); t.className = 'toast'; t.textContent = m; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
function addToCart(id) { let cart = getCart(), item = cart.find(i=>i.id===id), p = products.find(p=>p.id===id); if(item) item.quantity++; else cart.push({id:p.id,name:p.name,price:p.price,img:p.img,quantity:1}); saveCart(cart); showToast(`${p.name} добавлен в корзину!`); }
function addToCartFromModal() { if(currentModalProduct) addToCart(currentModalProduct.id); closeModal(); }
function showDetails(product) { currentModalProduct = product; document.getElementById('modalImg').src = product.img; document.getElementById('modalName').innerText = product.name; document.getElementById('modalPrice').innerText = `${product.price} ₽`; const catNames = {bright:'Яркие букеты', gentle:'Нежные букеты', minimalism:'Минимализм', single:'Единичные'}; document.getElementById('modalCat').innerHTML = `Категория: ${catNames[product.cat] || product.cat}`; document.getElementById('modalDesc').innerHTML = product.fullDesc || product.desc || 'Красивый букет от Estética. Свежие цветы, бережная упаковка.'; document.getElementById('productModal').style.display = 'flex'; }
function closeModal() { document.getElementById('productModal').style.display = 'none'; currentModalProduct = null; }
function applyFilters() { let cat = document.getElementById('categoryFilter').value, min = +document.getElementById('priceMin').value || 0, max = +document.getElementById('priceMax').value || 10000; filteredProducts = products.filter(p => (cat === 'all' || p.cat === cat) && p.price >= min && p.price <= max); renderCatalog(); }
function resetFilters() { document.getElementById('categoryFilter').value = 'all'; document.getElementById('priceMin').value = 0; document.getElementById('priceMax').value = 10000; filteredProducts = [...products]; renderCatalog(); }
function filterByCat(cat) { document.getElementById('categoryFilter').value = cat; applyFilters(); }
function renderCatalog() { const grid = document.getElementById('catalogGrid'); if(filteredProducts.length === 0) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#D56989;">Ничего не найдено</div>'; return; } grid.innerHTML = filteredProducts.map(p => `<div class="product-card"><img src="${p.img}"><h3>${p.name}</h3><p>${p.desc}</p><div class="price">${p.price} ₽</div><div class="card-buttons"><button class="cart-btn" onclick="addToCart(${p.id})">В корзину</button><button class="details-btn" onclick='showDetails(${JSON.stringify(p).replace(/'/g, "&#39;")})'>Подробнее</button></div></div>`).join(''); }
function renderCategories() { const cats = [{id:"bright", name:"Яркие букеты", icon:"🔥", count: products.filter(p => p.cat === "bright").length},{id:"gentle", name:"Нежные букеты", icon:"💕", count: products.filter(p => p.cat === "gentle").length},{id:"minimalism", name:"Минимализм", icon:"🖤", count: products.filter(p => p.cat === "minimalism").length},{id:"single", name:"Единичные", icon:"🌿", count: products.filter(p => p.cat === "single").length}]; document.getElementById('categoryCards').innerHTML = cats.map(c => `<div class="category-item" onclick="filterByCat('${c.id}')"><div class="category-icon">${c.icon}</div><div class="category-name">${c.name}</div><div class="category-count">${c.count} товаров</div></div>`).join(''); }
document.addEventListener('click', function(e) { if(e.target === document.getElementById('productModal')) closeModal(); });
loadProducts(); updateCartCount();
</script>
</body>
</html>
