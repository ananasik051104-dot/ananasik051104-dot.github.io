// ==================== ФУНКЦИИ ====================
let filtered = [...products];

function getCart(){return JSON.parse(localStorage.estetica_cart||'[]')}
function saveCart(c){localStorage.estetica_cart=JSON.stringify(c);updateCount()}
function updateCount(){let t=getCart().reduce((s,i)=>s+i.quantity,0),l=document.querySelector('.nav a[href="index3.html"]');if(l)l.innerHTML=t>0?`КОРЗИНА 🛒(${t})`:`КОРЗИНА`}
function toast(m){let t=document.querySelector('.toast');if(t)t.remove();t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2000)}
function addToCart(id){let c=getCart(),i=c.find(i=>i.id===id),p=products.find(p=>p.id===id);if(i)i.quantity++;else c.push({id:p.id,name:p.name,price:p.price,img:p.img,quantity:1});saveCart(c);toast(`${p.name} добавлен!`)}

function applyFilters(){let cat=document.getElementById('categoryFilter').value,mn=+document.getElementById('priceMin').value||0,mx=+document.getElementById('priceMax').value||1e4;filtered=products.filter(p=>(cat==='all'||p.cat===cat)&&p.price>=mn&&p.price<=mx);render()}
function resetFilters(){document.getElementById('categoryFilter').value='all';document.getElementById('priceMin').value=0;document.getElementById('priceMax').value=1e4;filtered=[...products];render()}
function filterByCat(cat){document.getElementById('categoryFilter').value=cat;applyFilters()}

function render(){
    const grid=document.getElementById('catalogGrid');
    if(!filtered.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:#D56989;font-size:24px;">🌸 Ничего не найдено 🌸</div>';return}
    grid.innerHTML=filtered.map(p=>`
        <div class="product-card">
            <img src="${p.img}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
            <div class="price">${p.price} ₽</div>
            <button onclick="addToCart(${p.id})">В корзину</button>
        </div>
    `).join('');
}

function renderCats(){
    const cats=[{id:"bright",name:"Яркие букеты",icon:"",count:products.filter(p=>p.cat==="bright").length},
                {id:"gentle",name:"Нежные букеты",icon:"",count:products.filter(p=>p.cat==="gentle").length},
                {id:"minimalism",name:"🖤 Минимализм",icon:"",count:products.filter(p=>p.cat==="minimalism").length},
                {id:"single",name:"Единичная позиция",icon:"",count:products.filter(p=>p.cat==="single").length}];
    document.getElementById('categoryCards').innerHTML=cats.map(c=>`<div class="category-item" onclick="filterByCat('${c.id}')"><div class="category-icon">${c.icon}</div><div class="category-name">${c.name}</div><div class="category-count">${c.count} товаров</div></div>`).join('');
}

renderCats();render();updateCount();
</script>
